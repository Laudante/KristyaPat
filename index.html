<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kristyasworn — Registro di Costruzione</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1ECDC;
    --paper-dim:#E7E0CB;
    --ink:#1E2A38;
    --ink-soft:#4B5A6B;
    --rule:#C9BE9E;
    --stamp-red:#A8402F;
    --stamp-green:#5B6E3A;
    --stamp-gold:#9A7A1E;
    --card:#FAF7EE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

  header{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;margin-bottom:6px;flex-wrap:wrap;gap:10px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:30px;
    margin:0;
    letter-spacing:-0.01em;
  }
  .subtitle{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:4px;
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  .save-status{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-align:right;
  }
  .save-status.dot::before{
    content:'●';color:var(--stamp-green);margin-right:5px;
  }

  nav.tabs{
    display:flex;gap:2px;margin:22px 0 20px;
    border-bottom:1px solid var(--rule);
  }
  nav.tabs button{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    background:none;border:none;
    padding:10px 16px;
    cursor:pointer;
    color:var(--ink-soft);
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
  }
  nav.tabs button.active{
    color:var(--ink);
    border-bottom:2px solid var(--stamp-red);
    font-weight:600;
  }

  .panel{display:none;}
  .panel.active{display:block;}

  .stamps{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin-bottom:26px;
  }
  .stamp{
    background:var(--card);
    border:1px solid var(--rule);
    border-radius:2px;
    padding:12px 14px;
    position:relative;
    overflow:hidden;
  }
  .stamp .label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink-soft);
  }
  .stamp .value{
    font-family:'Fraunces',serif;
    font-size:26px;
    font-weight:600;
    margin-top:2px;
  }
  .stamp .target{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--ink-soft);
    margin-top:1px;
  }
  .stamp .mark{
    position:absolute;top:10px;right:10px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    font-weight:600;
    letter-spacing:0.08em;
    padding:3px 7px;
    border-radius:2px;
    transform:rotate(4deg);
    border:1.5px solid currentColor;
  }
  .mark.pass{color:var(--stamp-green);}
  .mark.flag{color:var(--stamp-red);}

  .stamp.custom-viola{background:#EDE7F6;border-color:#6A4C93;}
  .stamp.custom-viola .mark{color:#6A4C93;}
  .stamp.custom-viola .mark.flag{color:var(--stamp-red);}
  .stamp.custom-marrone{background:#EFE3D6;border-color:#7B5A3D;}
  .stamp.custom-marrone .mark{color:#7B5A3D;}
  .stamp.custom-marrone .mark.flag{color:var(--stamp-red);}
  .stamp.custom-verde{background:#E3EDD8;border-color:#4A6B3A;}
  .stamp.custom-verde .mark{color:#4A6B3A;}
  .stamp.custom-verde .mark.flag{color:var(--stamp-red);}

  .role-group-row td{
    background:var(--ink);
    color:var(--paper);
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    padding:6px 10px;
    font-weight:600;
  }

  /* Colorazione riga per tipo carta */
  tr.type-monster td{background:#E4D2B8;}
  tr.type-monster:hover td{background:#D9C2A0;}
  tr.type-spell td{background:#D3E4C3;}
  tr.type-spell:hover td{background:#C4DAAF;}
  tr.type-trap td{background:#E1D3EC;}
  tr.type-trap:hover td{background:#D4C0E5;}
  tr.type-synchro td{background:#FFFFFF; border-top:1px solid var(--rule); border-bottom:1px solid var(--rule);}
  tr.type-synchro:hover td{background:#F3F3F3;}
  tr.type-fusion td, tr.type-xyz td{background:#E8DCC0;}
  tr.type-fusion:hover td, tr.type-xyz:hover td{background:#DCCCA0;}

  /* Colori etichette matchup: vedi blocco dopo .chip.on per garantire priorità CSS */

  .deck-total-banner{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    padding:9px 14px;
    border:1px solid var(--rule);
    background:var(--card);
    margin-bottom:18px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .deck-total-banner.bad{border-color:var(--stamp-red);color:var(--stamp-red);}

  table{
    width:100%;
    border-collapse:collapse;
    background:var(--card);
    border:1px solid var(--rule);
  }
  th{
    text-align:left;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--ink-soft);
    padding:8px 10px;
    border-bottom:1.5px solid var(--ink);
    white-space:nowrap;
  }
  td{
    padding:6px 10px;
    border-bottom:1px solid var(--rule);
    font-size:13.5px;
    vertical-align:middle;
  }
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--paper-dim);}

  input[type=text], input[type=number], select{
    font-family:'Inter',sans-serif;
    font-size:13px;
    background:transparent;
    border:1px solid transparent;
    border-radius:2px;
    padding:4px 5px;
    width:100%;
    color:var(--ink);
  }
  input[type=text]:hover, input[type=number]:hover, select:hover{border-color:var(--rule);}
  input[type=text]:focus, input[type=number]:focus, select:focus{
    outline:none;border-color:var(--stamp-red);background:#fff;
  }
  input[type=number]{width:55px;text-align:center;}
  input[type=checkbox]{transform:scale(1.15);cursor:pointer;}
  td.center{text-align:center;}

  .role-badge{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    padding:2px 6px;
    border-radius:2px;
    display:inline-block;
    border:1px solid var(--rule);
    color:var(--ink-soft);
  }
  select.role-select{cursor:pointer;}

  .del-btn{
    background:none;border:none;cursor:pointer;
    color:var(--stamp-red);font-size:15px;
    opacity:0.55;
  }
  .del-btn:hover{opacity:1;}

  .add-row{
    margin-top:12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    background:var(--ink);
    color:var(--paper);
    border:none;padding:8px 14px;
    cursor:pointer;
    border-radius:2px;
  }
  .add-row:hover{background:#31445a;}

  .section-title{
    font-family:'Fraunces',serif;
    font-size:19px;
    font-weight:600;
    margin:30px 0 10px;
    padding-bottom:6px;
    border-bottom:1px solid var(--rule);
  }

  .chip-row{display:flex;flex-wrap:wrap;gap:4px;max-width:280px;}
  .chip{
    font-family:'IBM Plex Mono',monospace;
    font-size:9.5px;
    padding:3px 6px;
    border:1px solid var(--rule);
    border-radius:10px;
    cursor:pointer;
    color:var(--ink-soft);
    background:transparent;
    user-select:none;
  }
  .chip.on{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  /* Colori etichette matchup — dopo .chip.on per vincere sulla specificità/ordine CSS */
  .matchup-tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:9.5px;
    padding:3px 7px;
    border-radius:10px;
    display:inline-block;
    font-weight:600;
    white-space:nowrap;
  }
  .chip.matchup-Vayu, .matchup-Vayu{background:#8E6BB0 !important; color:#000 !important; border-color:#8E6BB0 !important;}
  .chip.matchup-Blackwing, .matchup-Blackwing{background:#9FD3E8 !important; color:#000 !important; border-color:#9FD3E8 !important;}
  .chip.matchup-LS-Mirror, .matchup-LS-Mirror{background:#C9A227 !important; color:#fff !important; border-color:#C9A227 !important;}
  .chip.matchup-Frog, .matchup-Frog{background:#6FCFB0 !important; color:#000 !important; border-color:#6FCFB0 !important;}
  .chip.matchup-Machina, .matchup-Machina{background:#B0B0B0 !important; color:#5C4326 !important; border-color:#B0B0B0 !important;}
  .chip.matchup-Gladiator-Beast, .matchup-Gladiator-Beast{background:#F2D93C !important; color:#B01818 !important; border-color:#F2D93C !important;}
  .chip.matchup-Gigavise, .matchup-Gigavise{background:#CDE8C4 !important; color:#2E5A22 !important; border-color:#CDE8C4 !important;}
  .chip.matchup-Rogue, .matchup-Rogue{background:#8A6A4B !important; color:#000 !important; border-color:#8A6A4B !important;}
  .chip.matchup-Hero-Frog, .matchup-Hero-Frog{background:#1E6FE0 !important; color:#7FD4FF !important; border-color:#1E6FE0 !important;}
  .matchup-default{background:var(--paper-dim); color:var(--ink-soft); border:1px solid var(--rule);}

  .matrix-wrap{overflow-x:auto;margin-top:24px;}
  table.matrix th, table.matrix td{text-align:center;font-size:11.5px;}
  table.matrix th.rowhead, table.matrix td.rowhead{text-align:left;font-size:12.5px;}
  table.matrix td.yes{background:#DCE3C8;color:var(--stamp-green);font-weight:700;}

  .reset-link{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-decoration:underline;
    cursor:pointer;
    background:none;border:none;
    margin-top:30px;
  }
  .loading{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;color:var(--ink-soft);padding:40px;text-align:center;
  }

  .side-filter-bar {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px;
    padding: 10px; background: var(--paper-dim); border-radius: 2px;
  }
  .side-filter-bar button {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    padding: 5px 10px; border: 1px solid var(--rule); background: var(--card);
    cursor: pointer; border-radius: 2px;
  }
  .side-filter-bar button.active {
    background: var(--stamp-red); color: white; border-color: var(--stamp-red);
  }

  .preview-container {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px;
    border-top: 2px dashed var(--rule); padding-top: 20px;
  }
  .preview-box { background: var(--card); border: 1px solid var(--rule); padding: 15px; border-radius: 2px; }
  .preview-box h3 { font-family: 'Fraunces', serif; margin: 0 0 10px; font-size: 16px; border-bottom: 1px solid var(--rule); padding-bottom: 4px; }
  .preview-list { list-style: none; padding: 0; margin: 0; font-size: 12.5px; }
  .preview-list li { padding: 4px 0; border-bottom: 1px dashed var(--rule); display: flex; justify-content: space-between; }
  .preview-list li:last-child { border-bottom: none; }

  .pool-manager-box {
    margin-top: 40px; padding: 16px; background: var(--paper-dim); border: 1px dashed var(--rule); border-radius: 2px;
  }
  .pool-form { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .pool-form .form-group { display: flex; flex-direction: column; gap: 4px; min-width: 120px; flex: 1; }
  .pool-form label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; color: var(--ink-soft); }
  .pool-form input, .pool-form select { background: var(--card); border: 1px solid var(--rule); padding: 6px; }
  .pool-form button { background: var(--stamp-green); color: white; border: none; padding: 8px 16px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; cursor: pointer; border-radius: 2px; height: 31px; }
  .pool-form button:hover { background: #4a5a2f; }

  .kde-box {
    margin-top: 30px; background: var(--card); border: 1px solid var(--rule); padding: 16px; border-radius: 2px;
  }
  .kde-textarea {
    width: 100%; height: 160px; font-family: 'IBM Plex Mono', monospace; font-size: 11.5px;
    background: #fff; border: 1px solid var(--rule); padding: 10px; margin-top: 10px; resize: vertical;
  }

  .official-sheet{
    background:#fff; border:1px solid #999; margin-top:14px; font-family: Arial, Helvetica, sans-serif;
    color:#111; font-size:12px;
  }
  .official-sheet table{border-collapse:collapse; width:100%; background:#fff;}
  .official-sheet th, .official-sheet td{border:1px solid #333; padding:3px 6px; font-size:11.5px; white-space:normal;}
  .official-sheet th{background:#e4e4e4; text-transform:none; letter-spacing:0; font-family:Arial,Helvetica,sans-serif; color:#111;}
  .official-sheet .sheet-header{display:flex; justify-content:space-between; padding:8px; border-bottom:2px solid #333; align-items:center;}
  .official-sheet .sheet-total{font-weight:bold; font-size:15px;}
  .official-sheet .col-title{background:#ccc; text-align:center; font-weight:bold; padding:4px;}
  .print-btn{
    margin-top:10px; font-family:'IBM Plex Mono',monospace; font-size:12px; background:var(--ink); color:var(--paper);
    border:none; padding:8px 14px; cursor:pointer; border-radius:2px;
  }
  @media print{
    body *{visibility:hidden;}
    .official-sheet, .official-sheet *{visibility:visible;}
    .official-sheet{position:absolute; left:0; top:0; width:100%;}
  }
</style>
</head>

<div class="wrap" id="app">
  <div class="loading">Caricamento registro…</div>
</div>

<script>
const STORAGE_KEY = 'kristyasworn-deck-v2';
const POOL_STORAGE_KEY = 'kristyasworn-custom-pool';

const ROLES = [
  {id:'starter', label:'Starter', min:11, max:13},
  {id:'extender', label:'Extender', min:12, max:14},
  {id:'removal', label:'Rimozione', min:0, max:3},
  {id:'defense', label:'Difesa', min:5, max:7},
  {id:'reactive', label:'Reactive Ext.', min:0, max:3},
  {id:'bomb', label:'Bomba', min:2, max:3},
  {id:'necessity', label:'Necessità', min:0, max:1},
  {id:'other', label:'Altro', min:null, max:null},
];

const EXTRA_ROLES = [
  {id:'none', label:'Nessuno'},
  {id:'remover', label:'Rimozione/Utility'},
  {id:'beater', label:'Chiusura/Beater'},
  {id:'negator', label:'Controllo/Negate'},
  {id:'tech', label:'Situazionale/Tech'}
];

const PAT_NOTES = [
{id:'phil-01',chapter:19,chapterName:'Deckbuilding Philosophy',title:'Il problema fondamentale del deckbuilding',tags:['filosofia','risorse','tradeoff','base'],body:'Vorremmo che il mazzo gestisse qualunque situazione, ma le risorse sono limitate: una mano di 5-6 carte, un\'evocazione normale a turno, un numero fisso di carte nel mazzo. Il deckbuilding non è "coprire tutto", è scegliere i compromessi che massimizzano l\'utilità delle risorse limitate che abbiamo.'},
{id:'phil-02',chapter:19,chapterName:'Deckbuilding Philosophy',title:'Principio di Massima Utilità',tags:['principio','utilità','confronto carte'],body:'Una carta non basta che sia utile: deve essere la scelta migliore disponibile per quel ruolo. Se due carte fanno lo stesso lavoro ma una è strettamente superiore (stesse condizioni, statistiche migliori), non c\'è motivo di preferire la peggiore.'},
{id:'phil-03',chapter:19,chapterName:'Deckbuilding Philosophy',title:'Principio del Costo Minimo',tags:['principio','costo','card advantage','setup'],body:'Ogni carta ha un costo multiplo: lo slot che occupa nel mazzo (a scapito di alternative), la carta di mano che consuma quando la giochi, ed eventuali risorse aggiuntive richieste (scarti, tempo di setup, punti vita). Tra due carte che fanno lo stesso lavoro, vince quella con il costo complessivo più basso — non solo il prezzo scritto sulla carta.'},
{id:'phil-04',chapter:19,chapterName:'Deckbuilding Philosophy',title:'Principio Non-Lineare',tags:['principio','versatilità','opzioni','coerenza'],body:'Vogliamo un mazzo che funzioni come un coltellino svizzero, non un temperino: tante opzioni che si combinano tra loro, in modo che nessun singolo counter dell\'avversario possa fermarci del tutto. La somma delle carte deve valere più della somma delle singole parti.'},
{id:'phil-05',chapter:19,chapterName:'Deckbuilding Philosophy',title:'Il Principio di Pareto applicato al gioco',tags:['pareto','80-20','metagame','vantaggio'],body:'Sul piano tecnico (come giochi la mano), anche un avversario medio conosce circa l\'80% di quello che sai tu — il margine realistico è piccolo. Sul deckbuilding invece non c\'è questo tetto: puoi costruire un mazzo sensibilmente più forte e consistente di chiunque altro in sala, ed è lì che si trova il vantaggio più grande e più ripetibile per vincere un torneo, non nella rifinitura del gioco di mano.'},
{id:'filter-pos-01',chapter:21,chapterName:'Deckbuilding Filters',title:'Filtro positivo: essere una Magia',tags:['filtro','magia','spell','attivazione immediata'],body:'Una Magia si attiva nel momento in cui la peschi, senza dover aspettare un turno (a differenza di una Trappola). L\'attivazione immediata è di per sé un punto a favore.'},
{id:'filter-pos-02',chapter:21,chapterName:'Deckbuilding Filters',title:'Filtro positivo: abilitare Evocazioni Speciali',tags:['filtro','special summon','tempo'],body:'Qualunque carta che ti permette di Evocare Specialmente è generalmente un buon segno: significa fare più cose in un solo turno rispetto al semplice piano evocazione-normale.'},
{id:'filter-pos-03',chapter:21,chapterName:'Deckbuilding Filters',title:'Cercare è meglio di pescare',tags:['filtro','ricerca','pescata','consistenza'],body:'Una carta che cerca (search) è più affidabile di una che pesca (draw): con la ricerca sai esattamente cosa otterrai, con la pescata è probabilistico. Pescare resta comunque positivo — ti mostra più opzioni oltre alla mano di apertura — ma la ricerca è il gradino superiore.'},
{id:'filter-pos-04',chapter:21,chapterName:'Deckbuilding Filters',title:'Gerarchia delle fonti: Deck > Cimitero > Mano',tags:['filtro','special summon','cimitero','mano','setup'],body:'In ordine di forza decrescente: aggiungere/evocare dal Deck (costo di attivazione più basso, nessun setup) è meglio che farlo dal Cimitero (richiede comunque di aver giocato qualche turno per riempirlo), che è meglio che farlo dalla Mano (utile per il tempo, ma limitato alle carte già in mano).'},
{id:'filter-pos-05',chapter:21,chapterName:'Deckbuilding Filters',title:'Filtro positivo: carte multifunzione',tags:['filtro','versatilità','multi-effetto'],body:'Una carta con un solo effetto può fare solo una cosa; una con due o più effetti sarà utile in più scenari diversi. La versatilità di per sé è un punto a favore, indipendentemente da quanto sia potente ciascun singolo effetto.'},
{id:'filter-pos-06',chapter:21,chapterName:'Deckbuilding Filters',title:'Filtro positivo: valore immediato',tags:['filtro','trigger','evocazione','immediato'],body:'Gli effetti che si attivano al momento dell\'evocazione (o comunque subito) sono migliori di quelli che richiedono altre condizioni per attivarsi: non dipendono da nulla di esterno per essere utili.'},
{id:'filter-pos-07',chapter:21,chapterName:'Deckbuilding Filters',title:'Filtro positivo: indipendenza dall\'avversario',tags:['filtro','aggro','proattivo','going first'],body:'Le carte che si attivano indipendentemente da cosa fa l\'avversario sono superiori a quelle che richiedono una sua azione specifica (es. che attacchi, che controlli un certo tipo di carta). Un mazzo che punta su queste carte è più forte quando gioca per primo (going first).'},
{id:'filter-pos-08',chapter:21,chapterName:'Deckbuilding Filters',title:'Filtro positivo: generare carte',tags:['filtro','card advantage','opzioni'],body:'Più carte generi, più opzioni hai a disposizione, più situazioni diverse puoi gestire. La generazione di carte è quasi sempre un bene, salvo costi eccessivi altrove.'},
{id:'filter-pos-09',chapter:21,chapterName:'Deckbuilding Filters',title:'I Floodgate sono la difesa più potente',tags:['filtro','floodgate','difesa','lock','auto-win'],body:'Un floodgate blocca completamente l\'avversario su un aspetto chiave del gioco: se non trova un modo per liberarsene, vinci automaticamente senza nemmeno dover giocare oltre. Sono deboli contro un board avversario già stabilito, ma generano vittorie "gratuite" quando arrivano in tempo.'},
{id:'filter-pos-10',chapter:21,chapterName:'Deckbuilding Filters',title:'Difesa incatenabile > difesa reattiva',tags:['filtro','difesa','chain','trappole','timing'],body:'Sia la difesa incatenabile (chainable) sia quella reattiva bloccano di solito una sola giocata avversaria, ma la difesa incatenabile ha un timing di attivazione meno specifico — puoi rispondere a più situazioni — mentre quella reattiva richiede un momento preciso (es. dichiarazione d\'attacco).'},
{id:'filter-neg-01',chapter:21,chapterName:'Deckbuilding Filters',title:'Filtro negativo: essere un\'Evocazione Normale',tags:['filtro','evocazione normale','brick','limite'],body:'Se una carta richiede l\'evocazione normale per attivare il suo effetto, va guardata con cautela — è lo stesso principio dietro il tetto di circa 3 nomi/9 copie di starter a evocazione normale di cui parlavamo per Lightsworn. Non significa escluderla sempre, ma essere consapevoli del costo.'},
{id:'filter-neg-02',chapter:21,chapterName:'Deckbuilding Filters',title:'Filtro negativo: il Tributo conta doppio',tags:['filtro','tributo','evocazione normale','costo'],body:'Dover fare un\'Evocazione Tributo equivale ad avere due evocazioni normali racchiuse in una sola carta: il costo di setup si somma, non resta uguale a una singola evocazione normale.'},
{id:'filter-neg-03',chapter:21,chapterName:'Deckbuilding Filters',title:'Filtro negativo: essere una Trappola',tags:['filtro','trappola','attivazione ritardata','costo'],body:'Una Trappola ha un costo di attivazione più alto di una Magia equivalente: prima va settata, poi aspetta un turno prima di poter essere usata (salvo eccezioni). Questo è esattamente il motivo per cui, nel nostro discorso su Reactive Extender come Call of the Haunted e Monster Reincarnation, tenerne troppe intasa la mano.'},
{id:'filter-neg-04',chapter:21,chapterName:'Deckbuilding Filters',title:'Filtro negativo: dipendere dall\'avversario',tags:['filtro','reattivo','controllo','ceiling avversario'],body:'Meglio alzare il proprio soffitto che abbassare quello dell\'avversario. Carte come Raigeki o Mirror Force richiedono che l\'avversario abbia fatto qualcosa (un board da colpire) — sono utili, ma strutturalmente meno affidabili di una carta che funziona sempre, a prescindere da cosa fa l\'altro giocatore.'},
{id:'filter-neg-05',chapter:21,chapterName:'Deckbuilding Filters',title:'Filtro negativo: trigger su distruzione in battaglia',tags:['filtro','battaglia','trigger','controllo avversario'],body:'Se l\'effetto si attiva solo quando il mostro viene distrutto in combattimento, dipendi dal fatto che l\'avversario attacchi o ti offra un bersaglio — hai poco controllo su quando (o se) succede.'},
{id:'filter-neg-06',chapter:21,chapterName:'Deckbuilding Filters',title:'Filtro negativo: modificatori di ATK/DEF',tags:['filtro','atk','def','equip','costo senza vantaggio'],body:'Le carte che modificano solo attacco o difesa (es. equip come Axe of Despair) raramente valgono la carta di mano che costano, perché non generano un vantaggio diretto — sono un costo puro senza ritorno immediato in risorse.'},
{id:'filter-neg-07',chapter:21,chapterName:'Deckbuilding Filters',title:'Filtro negativo: attivazione in End Phase',tags:['filtro','end phase','valore ritardato'],body:'Vogliamo valore immediato; le carte che si attivano solo in End Phase ritardano il beneficio. Ci sono eccezioni quando altri pregi della carta compensano il ritardo, ma di base è un costo da tenere a mente.'},
{id:'prob-01',chapter:22,chapterName:'Probability',title:'Rendimenti decrescenti nelle copie di una carta',tags:['probabilità','copie','rendimenti decrescenti','consistenza'],body:'Passare da 1 a 2 copie di una carta non raddoppia la probabilità di averla in apertura, e da 2 a 3 il guadagno è ancora minore. È lo stesso principio per cui, ad esempio, la terza copia di una carta ridondante spesso vale meno di quanto sembri sulla carta — utile per pesare a mente la differenza reale tra tenere 2 o 3 copie di qualcosa.'},
{id:'prob-02',chapter:22,chapterName:'Probability',title:'Numeri di riferimento: probabilità in apertura (mazzo da 40)',tags:['probabilità','tabella','mano di apertura','ipergeometrica'],body:'Mazzo da 40 carte, mano di 5: 1 copia → 12.5% di pescarla; 2 copie → 23.72% almeno una; 3 copie → 33.76% almeno una. Mano di 6: 1 copia → 15%; 2 copie → 28.08%; 3 copie → 39.43% almeno una. Numeri utili per stimare velocemente l\'impatto di alzare o abbassare le copie di una carta chiave.'},
{id:'prob-03',chapter:22,chapterName:'Probability',title:'Calcolatrice ipergeometrica',tags:['probabilità','strumento','calcolo','ipergeometrica'],body:'Per calcoli specifici (popolazione = carte nel mazzo, successi in popolazione = copie della carta, dimensione campione = carte in mano, successi nel campione = quante ne vuoi pescare) si può usare un calcolatore ipergeometrico online — utile ogni volta che serve un numero esatto oltre alle tabelle di riferimento standard.'},
{id:'prob-04',chapter:22,chapterName:'Probability',title:'Dalla percentuale di game win alla percentuale di match win',tags:['probabilità','formula','torneo','match'],body:'Formula per convertire il tasso di vittorie sui singoli game in tasso di vittorie sui match (Bo3): m = -2g³ + 3g². Esempio: 70% di game win (g=0.7) corrisponde a circa 78.4% di match win — utile per stimare quanto un vantaggio anche modesto sul singolo game si amplifichi sul risultato del torneo.'},
{id:'prob-05',chapter:22,chapterName:'Probability',title:'Varianza: perché le carte \'sfortunate\' sembrano uscire sempre',tags:['varianza','percezione','bias','campione piccolo'],body:'La varianza è la differenza tra quello che ci aspettiamo statisticamente e quello che succede davvero in un campione piccolo (un singolo torneo). Sentire che "pesco sempre la carta scomoda invece di quella buona" è spesso solo l\'effetto naturale della varianza su pochi eventi, non un problema reale di ratio — utile da ricordare prima di cambiare una lista sulla base di una sola sessione di gioco negativa.'},
{id:'power-01',chapter:23,chapterName:'Power and Consistency',title:'Definizione di Potere e Soffitto (Ceiling)',tags:['potere','ceiling','definizione','impatto'],body:'Potere = impatto che una giocata riuscita ha sull\'esito della partita. Soffitto (Ceiling) = il massimo potere che il mazzo o la mano possono esprimere in un turno o nell\'arco della partita. Un mazzo con soffitto alto fa più cose, e le fa in modo più difficile da gestire per l\'avversario.'},
{id:'power-02',chapter:23,chapterName:'Power and Consistency',title:'Definizione di Consistenza',tags:['consistenza','definizione','costo','setup'],body:'Consistenza = la velocità/facilità con cui il mazzo riesce a fare quello che deve fare. Meno turni o risorse servono per andare a segno, più il mazzo è consistente. Potere e consistenza si misurano su due assi separati, non sono la stessa cosa.'},
{id:'power-03',chapter:23,chapterName:'Power and Consistency',title:'Il tradeoff Potere/Consistenza: Judgment Dragon vs Charge of the Light Brigade',tags:['tradeoff','judgment dragon','charge of the light brigade','esempio','lightsworn'],body:'Judgment Dragon ha un potere enorme (reset del campo) ma un costo di consistenza alto: richiede 4 Lightsworn diversi nel cimitero più il pagamento di 1000 LP — cioè turni di setup. Charge of the Light Brigade non richiede setup (si attiva sempre, se resta almeno un Lightsworn nel mazzo) ma ogni sua opzione singola pesa molto meno della resa di JD. È l\'esempio da manuale del tradeoff: più potere = meno consistenza, e viceversa, quasi sempre.'},
{id:'power-04',chapter:23,chapterName:'Power and Consistency',title:'Spettro Potere/Consistenza per confrontare mazzi o carte',tags:['potere','consistenza','confronto','metagame','spettro'],body:'Per confrontare due mazzi (o due carte nello stesso ruolo) chiediti: se entrambe le giocate riuscissero, quale avrebbe l\'impatto maggiore sulla partita (potere)? E quale delle due richiede meno turni/risorse per attivarsi (consistenza)? Il mazzo/carta ideale sta nel quadrante alto su entrambi gli assi — ma quando non è possibile, la scelta consapevole del compromesso è il vero lavoro del deckbuilder.'},
{id:'curve-01',chapter:20,chapterName:'Curves',title:'Le 7 categorie di ruolo (riepilogo rapido)',tags:['curve','ruoli','starter','extender','rimozione','difesa','reactive extender','bomba','necessità'],body:'Starter (11-13 copie): apre la partita da solo, poche condizioni. Extender (12-14): estende un turno già iniziato. Rimozione (max 3): elimina risorse avversarie già in campo. Difesa (~5-7): protegge nel turno avversario. Reactive Extender (max 3): trappole "set-and-wait" condizionate. Bomba (2-3): altissimo impatto, spesso morta se pescata presto. Necessità (max 1 per pezzo): valore quasi nullo da sola, serve solo in combo con un\'altra carta specifica.'},
{id:'curve-02',chapter:20,chapterName:'Curves',title:'Perché i range sono indicativi, non assoluti',tags:['curve','adattamento','archetipo','eccezioni'],body:'I range numerici (es. 3 nomi di starter a evocazione normale = 9 copie) nascono da mazzi reali dell\'autore, spesso strutturati con gli starter come pezzi separati dal motore principale. In archetipi dove l\'evocazione normale È il motore (come Lightsworn), il numero resta valido ma va interpretato nel contesto specifico, non applicato alla lettera senza pensare al perché esiste la regola.'},
{id:'side-01',chapter:24,chapterName:'The Side Deck',title:'Il criterio di una side deck efficiente',tags:['side deck','matchup','copertura','impatto'],body:'Una side card efficiente ha un impatto ampio su più matchup contemporaneamente, non una risposta iper-specifica buona solo contro un singolo avversario. Coincide esattamente con quello che avevi già intuito da solo in una regola precedente: preferire poche carte di side ad alto impatto piuttosto che stravolgere 8+ carte per ogni singolo matchup.'},
{id:'side-02',chapter:24,chapterName:'The Side Deck',title:'Side troppo dedicata = piano principale disallineato',tags:['side deck','rischio','piano','disallineamento'],body:'Una side troppo aggressiva nel personalizzarsi per un matchup rischia di farti giocare un mazzo diverso da quello per cui hai fatto tutto il lavoro di ottimizzazione nel main — il rischio non è solo "pescare carte deboli", è perdere la coerenza del piano che hai costruito con cura.'}

async function load(){
  try{
    const rawCustomPool = localStorage.getItem(POOL_STORAGE_KEY);
    if(rawCustomPool){
      const parsed = JSON.parse(rawCustomPool);
      CARD_POOL = [...DEFAULT_CARD_POOL, ...parsed];
    }

    const raw = localStorage.getItem(STORAGE_KEY);
    DATA = raw ? JSON.parse(raw) : defaultData();
    if(!DATA.matchups) DATA.matchups = defaultData().matchups;
    if(!DATA.cardRatings) DATA.cardRatings = defaultData().cardRatings;
    if(!DATA.matchupArchetype) DATA.matchupArchetype = defaultData().matchupArchetype;
    if(!DATA.side.find(c=>c.name==='Bottomless Trap Hole')){
      const bth = defaultData().side.find(c=>c.name==='Bottomless Trap Hole');
      if(bth) DATA.side.push(bth);
    }
    if(!DATA.sidePlans) DATA.sidePlans = defaultData().sidePlans;
    else {
      // aggiunge eventuali nuovi matchup di default senza sovrascrivere piani già salvati dall'utente
      const defaults = defaultData().sidePlans;
      Object.keys(defaults).forEach(m=>{ if(!DATA.sidePlans[m]) DATA.sidePlans[m] = defaults[m]; });
    }
  }catch(e){
    DATA = defaultData();
  }
  render();
}

async function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
    const s = document.getElementById('save-status');
    if(s){ s.textContent = 'salvato in questo browser'; s.classList.add('dot'); }
    generateKdeExport();
  }catch(e){
    const s = document.getElementById('save-status');
    if(s){ s.textContent = 'errore di salvataggio'; s.classList.remove('dot'); }
  }
}

async function resetAll(){
  if(!confirm('Ripristinare la configurazione di fabbrica?')) return;
  localStorage.removeItem(POOL_STORAGE_KEY);
  CARD_POOL = [...DEFAULT_CARD_POOL];
  DATA = defaultData();
  await save();

function sumQty(list){ return list.reduce((a,c)=>a+Number(c.qty||0),0); }

function computeRoleCounts(){
  const counts = {};
  ROLES.forEach(r=>counts[r.id]=0);
  DATA.main.forEach(c=>{
    counts[c.role] = (counts[c.role]||0) + Number(c.qty||0);
    if(c.role2){ counts[c.role2] = (counts[c.role2]||0) + Number(c.qty||0); }
  });
  return counts;
}

// Mostri del main che NON possono essere evocati normalmente (Special Summon-only, testo "Cannot be Normal Summoned/Set")
// Mostri che, per testo o per uso pratico, non contano come corpo affidabile da Evocazione Normale:
// Kristya e Wulf non possono proprio essere Normal Summoned; Necro Gardna tecnicamente può,
// ma in pratica quasi non si gioca mai così — resta escluso dal conteggio "sicurezza normali" su indicazione diretta.
const SPECIAL_SUMMON_ONLY = ['Archlord Kristya', 'Wulf, Lightsworn Beast', 'Necro Gardna'];

function isNormalSummonable(cardName){
  return !SPECIAL_SUMMON_ONLY.includes(cardName);
}

function countRemainingNormalSummonable(outNames){
  // outNames: array di nomi carta che verrebbero sidate fuori dal main
  let count = 0;
  DATA.main.forEach(c=>{
    if(c.type!=='Monster') return;
    if(!isNormalSummonable(c.name)) return;
    const outQty = outNames.filter(n=>n===c.name).length;
    count += Math.max(0, Number(c.qty||0) - outQty);
  });
  return count;
}

function computeCustomRules(){
  let ddv=0, ns=0, fairy=0;
  DATA.main.forEach(c=>{
    const q = Number(c.qty||0);
    if(c.type==='Monster' && c.atk!==null && c.atk!=='' && Number(c.atk)<=1500) ddv+=q;
    if(c.ns) ns+=q;
    if(c.fairy) fairy+=q;
  });
  return {ddv, ns, fairy};
}

function roleColor(roleId){
  return {
    starter:'#5B6E3A', extender:'#2F5A6B', removal:'#A8402F', defense:'#9A7A1E',
    reactive:'#7A5A9A', bomb:'#B23A2E', necessity:'#6B6B6B', other:'#999'
  }[roleId] || '#999';
}

function matchupClass(name){
  const safe = (name||'').trim().replace(/\s+/g,'-');
  const known = ['Vayu','Blackwing','LS-Mirror','Frog','Machina','Gladiator-Beast','Gigavise','Rogue','Hero-Frog'];
  return known.includes(safe) ? `matchup-${safe}` : 'matchup-default';
}

function generateKdeExport() {
  const kdeArea = document.getElementById('kde-output');
  if(!kdeArea) return;

  let text = "=== DECKLIST UFFICIALE ===\n\n";

  text += `MAIN DECK (${sumQty(DATA.main)} carte):\n`;
  const monsters = DATA.main.filter(c => c.type === 'Monster');
  const spells = DATA.main.filter(c => c.type === 'Spell');
  const traps = DATA.main.filter(c => c.type === 'Trap');

  if(monsters.length) {
    text += "  -- Mostri:\n";
    monsters.forEach(c => text += `  ${c.qty}x ${c.name}\n`);
  }
  if(spells.length) {
    text += "  -- Magie:\n";
    spells.forEach(c => text += `  ${c.qty}x ${c.name}\n`);
  }
  if(traps.length) {
    text += "  -- Trappole:\n";
    traps.forEach(c => text += `  ${c.qty}x ${c.name}\n`);
  }

  text += `\nEXTRA DECK (${sumQty(DATA.extra)} carte):\n`;
  DATA.extra.forEach(c => text += `  ${c.qty}x ${c.name}\n`);

  text += `\nSIDE DECK (${sumQty(DATA.side)} carte):\n`;
  DATA.side.forEach(c => text += `  ${c.qty}x ${c.name}\n`);

  kdeArea.value = text;
}

function handleYdkImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    const text = evt.target.result;
    const lines = text.split(/\r?\n/);
    const newMain = [], newSide = [], newExtra = [];
    let currentSection = null;
    const defaultMainRef = defaultData().main;
    const notFound = [];

    lines.forEach(line => {
      const clean = line.trim();
      if (!clean) return;
      if (clean === '#main') { currentSection = 'main'; return; }
      if (clean === '#extra') { currentSection = 'extra'; return; }
      if (clean === '!side') { currentSection = 'side'; return; }
      if (clean.startsWith('#')) return;
      if (/^\d+$/.test(clean)) {
        const poolCard = CARD_POOL.find(c => parseInt(c.id, 10) === parseInt(clean, 10));
        if (poolCard) {
          let targetArr = currentSection === 'side' ? newSide : (currentSection === 'extra' ? newExtra : newMain);
          const existing = targetArr.find(c => c.name === poolCard.name);
          if (existing) { existing.qty++; } else {
            const refCard = defaultMainRef.find(c => c.name === poolCard.name);
            let role = refCard ? refCard.role : (poolCard.type==='Spell'?'extender':(poolCard.type==='Trap'?'defense':'other'));
            let ns = refCard ? refCard.ns : false;
            if(currentSection === 'main'){
              targetArr.push({ name: poolCard.name, qty: 1, type: poolCard.type==='ExtraMonster'?'Monster':poolCard.type, role, atk: poolCard.atk, fairy: poolCard.fairy||false, ns });
            } else if(currentSection === 'side'){
              targetArr.push({ name: poolCard.name, qty: 1, matchups: [], replaces: '', sideStatus: 'both' });
            } else {
              targetArr.push({ name: poolCard.name, qty: 1, role: 'none' });
            }
          }
        } else {
          notFound.push(clean);
        }
      }
    });
    if (newMain.length || newSide.length || newExtra.length) {
      DATA.main = newMain; DATA.side = newSide; DATA.extra = newExtra;
      save(); render();
    }
    if (notFound.length) {
      alert('Attenzione: ' + notFound.length + ' passcode nel file .ydk non sono stati trovati nel pool carte e sono stati ignorati:\n' + notFound.join(', ') + '\n\nPuoi aggiungerli manualmente da "Inserisci una Nuova Carta nella Lista Globale" qui sotto.');
    }
  };
  reader.readAsText(file);
}

function downloadSideCSV(){
  let csv = "Carta,Quantita,Andamento,Sostituisce,Matchup Associati\n";
  DATA.side.forEach(c => {
    csv += `"${c.name}",${c.qty},"${c.sideStatus || 'both'}","${c.replaces || ''}","${c.matchups.join(' | ')}"\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.setAttribute("download", "kristyasworn_side_patterns.csv");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function renderPatSideHint(){
  const total = DATA.side.length;
  if(total === 0) return '';
  const narrow = DATA.side.filter(c => c.matchups.length <= 1);
  const broad = DATA.side.filter(c => c.matchups.length >= 2);
  const narrowQty = narrow.reduce((a,c)=>a+Number(c.qty||0),0);
  const totalQty = sumQty(DATA.side);
  const ratio = totalQty ? narrowQty/totalQty : 0;

  let tone, msg;
  if(ratio > 0.5){
    tone = 'flag';
    msg = `${narrowQty} carte su ${totalQty} coprono un solo matchup (o nessuno). Pat direbbe: una side efficiente ha ampio impatto — poche carte che spostano molti matchup, non tante risposte iper-specifiche. Candidate a rivedere: ${narrow.slice(0,4).map(c=>c.name).join(', ')}${narrow.length>4?'…':''}.`;
  } else if(ratio > 0.25){
    tone = 'neutral';
    msg = `${narrowQty} carte su ${totalQty} sono mirate a un solo matchup — accettabile, ma tienile d'occhio: Pat preferisce che la side sposti molti matchup con poche carte, non il contrario.`;
  } else {
    tone = 'pass';
    msg = `Buona ampiezza d'impatto: la maggior parte delle tue side card copre più di un matchup contemporaneamente, coerente con il principio di Pat su side deck efficienti.`;
  }

  const color = tone==='flag' ? 'var(--stamp-red)' : (tone==='pass' ? 'var(--stamp-green)' : 'var(--stamp-gold)');
  return `<div style="border-left:3px solid ${color}; background:var(--card); border:1px solid var(--rule); border-left-width:3px; border-left-color:${color}; padding:10px 14px; margin-bottom:16px; font-size:12.5px; line-height:1.5;">
    <strong style="font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; color:${color};">Nota di Pat</strong><br>${msg}
  </div>`;
}

function normalizeText(s){
  return (s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[?!.,;:']/g,' ')
    .replace(/\s+/g,' ').trim();
}

function fuzzyFindCard(rawName){
  const q = normalizeText(rawName);
  if(!q) return null;
  let best = null, bestScore = 0;
  DATA.main.forEach(c=>{
    const n = normalizeText(c.name);
    let score = 0;
    if(n === q) score = 100;
    else if(n.includes(q) || q.includes(n)) score = 60 + Math.min(q.length, n.length);
    else {
      const qWords = q.split(' ');
      const hit = qWords.filter(w=>w.length>2 && n.includes(w)).length;
      score = hit * 10;
    }
    if(score > bestScore){ bestScore = score; best = c; }
  });
  return bestScore >= 10 ? best : null;
}

function roleExplanation(roleId){
  const map = {
    starter: "apre la partita da solo, con poche condizioni (target 11–13 copie).",
    extender: "estende un turno già iniziato, non lo apre da sé (target 12–14 copie).",
    removal: "elimina una risorsa già in campo dell'avversario (target massimo 3 copie).",
    defense: "protegge nel turno dell'avversario (target circa 5–7 copie).",
    reactive: "è una trappola \"set-and-wait\" condizionata: utile solo dopo un turno di attesa o un certo stato di campo (target massimo 3 copie).",
    bomb: "altissimo impatto ma spesso morta se pescata presto, poco consistente (target 2–3 copie).",
    necessity: "vale poco o nulla da sola, serve solo in combinazione con un'altra carta specifica (target massimo 1 copia).",
    other: "non rientra in una categoria di curva precisa in questa lista."
  };
  return map[roleId] || '';
}

function answerPatQuestion(rawQuery){
  const q = normalizeText(rawQuery);
  if(!q) return null;

  // Intent 1: ruolo di una carta — "che ruolo ha X", "ruolo di X", "ruolo X", "cos'è X nel main"
  let m = q.match(/(?:che ruolo ha|ruolo di|ruolo del(?:la)?|ruolo)\s+(.+)/);
  if(m){
    const card = fuzzyFindCard(m[1]);
    if(card){
      const roleDef = ROLES.find(r=>r.id===card.role);
      return {
        title: `${card.name} → ${roleDef ? roleDef.label : card.role}`,
        body: `Nel tuo main è classificata come <strong>${roleDef?roleDef.label:card.role}</strong>: ${roleExplanation(card.role)}<br><br>
          Copie in main: ${card.qty} · ATK: ${card.atk===null?'—':card.atk} · Fata: ${card.fairy?'sì':'no'} · Starter a evocazione normale: ${card.ns?'sì':'no'}
          ${card.type==='Monster' && card.atk!==null && card.atk<=1500 ? '<br>⚠ Bersaglio valido di Deck Devastation Virus (ATK ≤ 1500).' : ''}`
      };
    }
  }

  // Intent 2: conteggio per categoria — "quanti/e starter", "quante bombe ho"
  m = q.match(/quant[ie]\s+(.+?)(?:\s+ho)?$/);
  if(m){
    const roleQuery = normalizeText(m[1]);
    const roleDef = ROLES.find(r => roleQuery.includes(normalizeText(r.label)) || normalizeText(r.label).includes(roleQuery));
    if(roleDef){
      const counts = computeRoleCounts();
      const v = counts[roleDef.id] || 0;
      const inRange = roleDef.min===null || (v>=roleDef.min && v<=roleDef.max);
      const targetStr = roleDef.min===roleDef.max ? roleDef.min : `${roleDef.min}–${roleDef.max}`;
      return {
        title: `${roleDef.label}: ${v} copie`,
        body: `Target di riferimento: ${roleDef.min===null?'nessun target fisso':targetStr}. ${roleDef.min!==null ? (inRange ? 'Sei dentro il range. ✓' : `Sei ${v<roleDef.min?'sotto':'sopra'} il range. ⚠`) : ''}`
      };
    }
    // conteggi custom (DDV, starter NS, fedeli)
    const custom = computeCustomRules();
    if(/ddv|devastation|virus/.test(roleQuery)) return {title:`Target DDV: ${custom.ddv}`, body:`Massimo consigliato: 12. ${custom.ddv<=12?'Sei dentro il limite. ✓':'Sei sopra il limite. ⚠'}`};
    if(/fat[ae]|fedel/.test(roleQuery)) return {title:`Fedeli (Fairy): ${custom.fairy}`, body:`Target: 8. ${custom.fairy===8?'Esatto. ✓':'Diverso dal target. ⚠'}`};
    if(/normal summon|evocazion/.test(roleQuery)) return {title:`Starter a evocazione normale: ${custom.ns}`, body:`Massimo consigliato: 9. ${custom.ns<=9?'Sei dentro il limite. ✓':'Sei sopra il limite. ⚠'}`};
  }

  return null;
}

function scoreNote(note, query){
  if(!query) return 1;
  const q = query.toLowerCase();
  const haystack = (note.title + ' ' + note.body + ' ' + note.tags.join(' ') + ' ' + note.chapterName).toLowerCase();
  if(note.title.toLowerCase().includes(q)) return 3;
  if(note.tags.some(t=>t.toLowerCase().includes(q))) return 2;
  if(haystack.includes(q)) return 1;
  return 0;
}

function computeMainTypeCounts(){
  const c = {Monster:0, Spell:0, Trap:0};
  DATA.main.forEach(card=>{ c[card.type] = (c[card.type]||0) + Number(card.qty||0); });
  return c;
}

function computeSideSwapImpact(matchup, scenario){
  const plan = DATA.sidePlans[matchup] && DATA.sidePlans[matchup][scenario];
  if(!plan) return null;

  const inChecked = plan.in.filter(c=>c.checked);
  const outChecked = plan.out.filter(c=>c.checked);
  const inCount = inChecked.reduce((a,c)=>a+Number(c.qty||0),0);
  const outCount = outChecked.reduce((a,c)=>a+Number(c.qty||0),0);

  const outNamesExpanded = [];
  outChecked.forEach(c=>{ for(let i=0;i<c.qty;i++) outNamesExpanded.push(c.name); });
  const remainingNS = countRemainingNormalSummonable(outNamesExpanded);

  // Ratio Mostro/Magia/Trappola post-swap
  const baseTypes = computeMainTypeCounts();
  const postTypes = {...baseTypes};
  outChecked.forEach(c=>{
    const poolCard = findInPool(c.name);
    const t = poolCard ? (poolCard.type==='ExtraMonster'?'Monster':poolCard.type) : (DATA.main.find(m=>m.name===c.name)||{}).type;
    if(t) postTypes[t] = (postTypes[t]||0) - Number(c.qty||0);
  });
  inChecked.forEach(c=>{
    const poolCard = findInPool(c.name);
    const t = poolCard ? (poolCard.type==='ExtraMonster'?'Monster':poolCard.type) : 'Monster';
    postTypes[t] = (postTypes[t]||0) + Number(c.qty||0);
  });

  // Ruoli post-swap (considerando ruolo primario + secondario per le carte OUT già nel main)
  const baseRoles = computeRoleCounts();
  const postRoles = {...baseRoles};
  outChecked.forEach(c=>{
    const mainCard = DATA.main.find(m=>m.name===c.name);
    if(mainCard){
      postRoles[mainCard.role] = (postRoles[mainCard.role]||0) - Number(c.qty||0);
      if(mainCard.role2) postRoles[mainCard.role2] = (postRoles[mainCard.role2]||0) - Number(c.qty||0);
    }
  });
  inChecked.forEach(c=>{
    const sideCard = DATA.side.find(s=>s.name===c.name);
    const role = sideCard ? sideCard.role : 'other';
    postRoles[role] = (postRoles[role]||0) + Number(c.qty||0);
  });

  return { inCount, outCount, balance: inCount-outCount, remainingNS, postTypes, baseTypes, postRoles, baseRoles };
}

function renderSidePlanContent(){
  const container = document.getElementById('sideplan-content');
  if(!container) return;
  const plan = DATA.sidePlans[sidePlanMatchup] && DATA.sidePlans[sidePlanMatchup][sidePlanScenario];
  if(!plan){ container.innerHTML = '<p style="color:var(--ink-soft); font-size:12.5px;">Nessun piano per questo matchup/scenario.</p>'; return; }

  const impact = computeSideSwapImpact(sidePlanMatchup, sidePlanScenario);
  const confidence = DATA.sidePlans[sidePlanMatchup].confidence;

  const balanceOk = impact.balance === 0;
  const swapOk = Math.max(impact.inCount, impact.outCount) <= 8;
  const nsOk = impact.remainingNS >= 10;

  const roleRows = ROLES.filter(r=>r.id!=='other').map(r=>{
    const before = impact.baseRoles[r.id]||0, after = impact.postRoles[r.id]||0;
    const inRange = r.min===null || (after>=r.min && after<=r.max);
    const changed = before !== after;
    return `<tr>
      <td class="rowhead">${r.label}</td>
      <td>${before}</td>
      <td style="font-weight:${changed?'700':'400'}; color:${changed?(inRange?'var(--stamp-green)':'var(--stamp-red)'):'var(--ink)'}">${after}</td>
      <td style="color:var(--ink-soft); font-size:10.5px;">${r.min===null?'—':(r.min===r.max?r.min:r.min+'–'+r.max)}</td>
    </tr>`;
  }).join('');

  const typeRows = ['Monster','Spell','Trap'].map(t=>{
    const before = impact.baseTypes[t]||0, after = impact.postTypes[t]||0;
    const changed = before !== after;
    return `<tr>
      <td class="rowhead">${t==='Monster'?'Mostri':t==='Spell'?'Magie':'Trappole'}</td>
      <td>${before}</td>
      <td style="font-weight:${changed?'700':'400'}">${after}</td>
    </tr>`;
  }).join('');

  return map[type] ? {...map[type], type} : null;

      <span style="font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; padding:3px 8px; border-radius:10px; background:${confidence==='confirmed'?'#DCE3C8':'#F0E4C8'}; color:${confidence==='confirmed'?'var(--stamp-green)':'var(--stamp-gold)'};">${confidence==='confirmed'?'Confermato':'Bozza — da rivedere'}</span>
    </div>

      <div class="stamp ${balanceOk?'':''}">

        <div class="mark ${balanceOk?'pass':'flag'}">${balanceOk?'OK':(impact.balance>0?'MANCA OUT':'MANCA IN')}</div>
      </div>
      <div class="stamp">

        <div class="value">${Math.max(impact.inCount, impact.outCount)}</div>
        <div class="mark ${swapOk?'pass':'flag'}">${swapOk?'OK':'SOPRA'}</div>

      <div>

        ${plan.in.map((c,i)=>`
          <div style="display:flex; gap:8px; align-items:flex-start; padding:8px 0; border-bottom:1px dashed var(--rule);">
            <input type="checkbox" ${c.checked?'checked':''} data-side="in" data-idx="${i}" class="sideplan-check" style="margin-top:3px;">
            <div style="flex:1;">
              <div style="font-size:13px; font-weight:600;">${c.qty}x ${c.name}</div>
              <input type="text" value="${c.reason||''}" data-side="in" data-idx="${i}" class="sideplan-reason" style="width:100%; font-size:11.5px; color:var(--ink-soft); border:1px solid transparent; background:transparent; padding:2px 0;">
            </div>
          </div>
        `).join('')}
      </div>
      <div>
        <h3 style="font-family:'Fraunces',serif; font-size:15px; margin:0 0 8px; color:var(--stamp-red);">Candidati OUT (dal main)</h3>
        ${plan.out.map((c,i)=>`
          <div style="display:flex; gap:8px; align-items:flex-start; padding:8px 0; border-bottom:1px dashed var(--rule);">
            <input type="checkbox" ${c.checked?'checked':''} data-side="out" data-idx="${i}" class="sideplan-check" style="margin-top:3px;">
            <div style="flex:1;">
              <div style="font-size:13px; font-weight:600;">${c.qty}x ${c.name}</div>
              <input type="text" value="${c.reason||''}" data-side="out" data-idx="${i}" class="sideplan-reason" style="width:100%; font-size:11.5px; color:var(--ink-soft); border:1px solid transparent; background:transparent; padding:2px 0;">

        <table><thead><tr><th class="rowhead">Tipo</th><th>Prima</th><th>Dopo</th></tr></thead><tbody>${typeRows}</tbody></table>
      </div>

        <h3 style="font-family:'Fraunces',serif; font-size:14px; margin:0 0 6px;">Categorie di ruolo dopo lo scambio</h3>

      </div>
    </div>

function nCr(n, r){
  if(r<0 || r>n || n<0) return 0;
  r = Math.min(r, n-r);
  let result = 1;
  for(let i=0;i<r;i++){ result = result * (n-i) / (i+1); }
  return result;
}

function hypergeomAtLeast(N, K, n, k){
  if(k<=0) return 1;
  if(K<0 || N<=0 || n<=0 || K>N || n>N) return 0;
  let cumulativeBelow = 0;
  const maxI = Math.min(k-1, n, K);
  for(let i=0;i<=maxI;i++){ cumulativeBelow += nCr(K,i)*nCr(N-K,n-i); }
  const total = nCr(N,n);
  if(total===0) return 0;
  return Math.max(0, Math.min(1, 1-(cumulativeBelow/total)));
}

function updateHypergeomCalc(){
  const pop = Number(document.getElementById('hg-pop')?.value);
  const succ = Number(document.getElementById('hg-succ')?.value);
  const sample = Number(document.getElementById('hg-sample')?.value);
  const target = Number(document.getElementById('hg-target')?.value);
  const out = document.getElementById('hg-result');
  if(!out) return;
  if(!pop || sample<0 || succ<0 || target<0){ out.textContent = '—'; return; }
  const p = hypergeomAtLeast(pop, succ, sample, target);
  out.innerHTML = `${(p*100).toFixed(2)}% <span style="font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); font-weight:400;">di pescare almeno ${target} copia/e</span>`;
}

function updateMatchWinCalc(){
  const gPct = Number(document.getElementById('mw-g')?.value);
  const out = document.getElementById('mw-result');
  if(!out) return;
  if(isNaN(gPct)){ out.textContent = '—'; return; }
  const g = gPct/100;
  const m = -2*Math.pow(g,3) + 3*Math.pow(g,2);
  out.innerHTML = `${(m*100).toFixed(1)}% <span style="font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); font-weight:400;">di vincere il match (Bo3)</span>`;
}

function renderPatAnswer(){
  const box = document.getElementById('pat-answer');
  if(!box) return;
  if(!patQuery.trim()){ box.innerHTML = ''; return; }
  const answer = answerPatQuestion(patQuery);
  if(!answer){ box.innerHTML = ''; return; }
  box.innerHTML = `
    <div style="background:#EDE7F6; border:1px solid #6A4C93; border-left:4px solid #6A4C93; border-radius:2px; padding:14px 16px; margin-bottom:16px;">
      <div style="font-family:'IBM Plex Mono',monospace; font-size:9.5px; text-transform:uppercase; color:#6A4C93; margin-bottom:4px;">Risposta diretta dai tuoi dati</div>
      <div style="font-family:'Fraunces',serif; font-size:16px; font-weight:600; margin-bottom:4px;">${answer.title}</div>
      <div style="font-size:13px; line-height:1.55;">${answer.body}</div>
    </div>
  `;
}

function renderPatResults(){
  renderPatAnswer();
  const container = document.getElementById('pat-results');
  if(!container) return;

  let results = PAT_NOTES.filter(n => patChapterFilter==='all' || n.chapter===patChapterFilter);
  if(patQuery.trim()){
    results = results
      .map(n => ({n, score: scoreNote(n, patQuery.trim())}))
      .filter(x => x.score > 0)
      .sort((a,b) => b.score - a.score)
      .map(x => x.n);
  }

  if(results.length === 0){
    container.innerHTML = `<div style="font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); padding:20px; text-align:center;">Nessuna nota trovata. Prova un altro termine, o un capitolo diverso.</div>`;
    return;
  }

  container.innerHTML = results.map(n => `
    <div style="background:var(--card); border:1px solid var(--rule); border-left:3px solid var(--stamp-gold); border-radius:2px; padding:14px 16px; margin-bottom:10px;">
      <div style="display:flex; justify-content:space-between; align-items:baseline; gap:10px; flex-wrap:wrap;">
        <div style="font-family:'Fraunces',serif; font-size:15.5px; font-weight:600;">${n.title}</div>
        <div style="font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:var(--ink-soft); text-transform:uppercase; white-space:nowrap;">Cap. ${n.chapter} · ${n.chapterName}</div>
      </div>
      <div style="font-size:13px; line-height:1.55; margin-top:6px; color:var(--ink);">${n.body}</div>
      <div style="margin-top:8px; display:flex; gap:5px; flex-wrap:wrap;">
        ${n.tags.map(t=>`<span style="font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:var(--ink-soft); border:1px solid var(--rule); border-radius:10px; padding:2px 7px;">${t}</span>`).join('')}
      </div>
    </div>
  `).join('');
}


function bindGlobal(){
  document.querySelectorAll('nav.tabs button').forEach(b=>{
    b.onclick = ()=>{ activeTab = b.dataset.tab; render(); };
  });

  document.getElementById('reset-btn').onclick = resetAll;

  const ydkInput = document.getElementById('ydk-file-input');
  if (ydkInput) ydkInput.onchange = handleYdkImport;

  const addMatchupBtn = document.getElementById('add-matchup-btn');
  if(addMatchupBtn) addMatchupBtn.onclick = addNewMatchup;

  const csvBtn = document.getElementById('download-csv-btn');
  if(csvBtn) csvBtn.onclick = downloadSideCSV;

  const printBtn = document.getElementById('print-sheet-btn');
  if(printBtn) printBtn.onclick = ()=>window.print();

  const poolForm = document.getElementById('pool-card-form');
  if(poolForm) poolForm.onsubmit = handleAddCustomCard;

  const hobanSearch = document.getElementById('pat-search');
  if(hobanSearch){
    hobanSearch.value = patQuery;
    hobanSearch.oninput = ()=>{ patQuery = hobanSearch.value; renderPatResults(); };
    hobanSearch.onkeydown = (e)=>{ if(e.key==='Enter'){ patQuery = hobanSearch.value; renderPatResults(); } };
    if(activeTab==='hoban') hobanSearch.focus({preventScroll:true});
  }
  const askBtn = document.getElementById('pat-ask-btn');
  if(askBtn) askBtn.onclick = ()=>{ patQuery = document.getElementById('pat-search').value; renderPatResults(); };

  ['hg-pop','hg-succ','hg-sample','hg-target'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.oninput = updateHypergeomCalc;
  });
  const mwG = document.getElementById('mw-g');
  if(mwG) mwG.oninput = updateMatchWinCalc;
  updateHypergeomCalc();
  updateMatchWinCalc();

  document.querySelectorAll('.pat-example').forEach(b=>{
    b.onclick = ()=>{
      patQuery = b.dataset.example;
      const input = document.getElementById('pat-search');
      if(input) input.value = patQuery;
      renderPatResults();
    };
  });

  document.querySelectorAll('.pat-chapter-btn').forEach(b=>{
    b.onclick = ()=>{
      const val = b.dataset.chapter;
      patChapterFilter = val==='all' ? 'all' : Number(val);
      document.querySelectorAll('.pat-chapter-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      renderPatResults();
    };
  });

  const genBtn = document.getElementById('gen-sideplan-btn');
  if(genBtn) genBtn.onclick = ()=>{ sidePlanVisible = true; render(); };

  document.querySelectorAll('.sideplan-matchup-btn').forEach(b=>{
    b.onclick = ()=>{ sidePlanMatchup = b.dataset.matchup; render(); };
  });
  document.querySelectorAll('.sideplan-scenario-btn').forEach(b=>{
    b.onclick = ()=>{ sidePlanScenario = b.dataset.scenario; render(); };
  });
  document.querySelectorAll('.sideplan-check').forEach(el=>{
    el.onchange = ()=>{
      const side = el.dataset.side, idx = Number(el.dataset.idx);
      DATA.sidePlans[sidePlanMatchup][sidePlanScenario][side][idx].checked = el.checked;
      save(); renderSidePlanContent();
    };
  });
  document.querySelectorAll('.sideplan-reason').forEach(el=>{
    el.onchange = ()=>{
      const side = el.dataset.side, idx = Number(el.dataset.idx);
      DATA.sidePlans[sidePlanMatchup][sidePlanScenario][side][idx].reason = el.value;
      save();
    };
  });
  const addOutBtn = document.getElementById('sideplan-add-out');
  if(addOutBtn) addOutBtn.onclick = ()=>{
    const name = prompt('Nome della carta del main da aggiungere come candidato OUT:');
    if(!name) return;
    const mainCard = DATA.main.find(m=>m.name.toLowerCase()===name.trim().toLowerCase());
    DATA.sidePlans[sidePlanMatchup][sidePlanScenario].out.push({
      name: mainCard ? mainCard.name : name.trim(),
      qty: 1, checked: false, reason: ''
    });
    save(); renderSidePlanContent();
  };

  document.querySelectorAll('.side-filter-bar button[data-filter]').forEach(b=>{
    b.onclick = ()=>{ activeSideFilter = b.dataset.filter; renderSideRows(); document.querySelectorAll('.side-filter-bar button[data-filter]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); };
  });

  document.getElementById('add-main').onclick = ()=>{
    DATA.main.push({name:'', qty:1, type:'Monster', role:'other', atk:null, fairy:false, ns:false});
    save(); render();
  };
  document.getElementById('add-side').onclick = ()=>{
    DATA.side.push({name:'', qty:1, matchups:[], replaces:'', sideStatus:'both'});
    save(); render();
  };
  document.getElementById('add-extra').onclick = ()=>{
    DATA.extra.push({name:'', qty:1, role:'none'});
    save(); render();
  };

  document.querySelectorAll('.del-btn').forEach(b=>{
    b.onclick = ()=>{
      DATA[b.dataset.list].splice(Number(b.dataset.idx),1);
      save(); render();
    };
  });

  document.querySelectorAll('.rating-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      DATA.cardRatings[idx][field] = el.value;
      save(); render();
    };
  });
  const addRatingBtn = document.getElementById('add-rating');
  if(addRatingBtn) addRatingBtn.onclick = ()=>{
    DATA.cardRatings.push({name:'', matchup: DATA.matchups[0], rating:'forte', note:''});
    save(); render();
  };

  document.querySelectorAll('.main-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      let val = el.type==='checkbox' ? el.checked : el.value;
      if(field==='qty' || field==='atk') val = val===''? null : Number(val);

      if(field==='name'){
        const pool = findInPool(val);
        if(pool){
          DATA.main[idx].type = pool.type==='ExtraMonster'?'Monster':pool.type;
          DATA.main[idx].atk = pool.atk;
          DATA.main[idx].fairy = pool.fairy;
        }
      }
      save(); render();
    };
  });

  document.querySelectorAll('.side-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      let val = field==='qty' ? Number(el.value) : el.value;
      DATA.side[idx][field] = val;
      if(field==='name'){
        const pool = findInPool(val);
        if(pool){
          DATA.side[idx].name = pool.name;
        }
      }
      save(); render();
    };
  });

  document.querySelectorAll('.extra-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      let val = field==='qty' ? Number(el.value) : el.value;
      DATA.extra[idx][field] = val;
      if(field==='name'){
        const pool = findInPool(val);
        if(pool){
          DATA.extra[idx].name = pool.name;
        }
      }
      save(); render();
    };
  });

  document.querySelectorAll('.chip').forEach(el=>{
    el.onclick = ()=>{
      const idx = Number(el.dataset.idx), m = el.dataset.matchup;
      const arr = DATA.side[idx].matchups;
      const pos = arr.indexOf(m);
      if(pos>=0) arr.splice(pos,1); else arr.push(m);
      save(); render();
    };
  });
}
