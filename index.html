<style>
  :root{
    --paper:#F1ECDC;
    --paper-dim:#E7E0CB;
    --ink:#1E2A38;
    --ink-soft:#4B5A6B;
    --rule:#C9BE9E;
    --stamp-red:#A8402F;
    --stamp-green:#5B6E3A;
    --stamp-gold:#9A7A1E;
    --card:#FAF7EE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

  header{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;margin-bottom:6px;flex-wrap:wrap;gap:10px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:30px;
    margin:0;
    letter-spacing:-0.01em;
  }
  .subtitle{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:4px;
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  .save-status{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-align:right;
  }
  .save-status.dot::before{
    content:'●';color:var(--stamp-green);margin-right:5px;
  }

  nav.tabs{
    display:flex;gap:2px;margin:22px 0 20px;
    border-bottom:1px solid var(--rule);
  }
  nav.tabs button{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    background:none;border:none;
    padding:10px 16px;
    cursor:pointer;
    color:var(--ink-soft);
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
  }
  nav.tabs button.active{
    color:var(--ink);
    border-bottom:2px solid var(--stamp-red);
    font-weight:600;
  }

  .panel{display:none;}
  .panel.active{display:block;}

  /* stamp grid */
  .stamps{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin-bottom:26px;
  }
  .stamp{
    background:var(--card);
    border:1px solid var(--rule);
    border-radius:2px;
    padding:12px 14px;
    position:relative;
    overflow:hidden;
  }
  .stamp .label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink-soft);
  }
  .stamp .value{
    font-family:'Fraunces',serif;
    font-size:26px;
    font-weight:600;
    margin-top:2px;
  }
  .stamp .target{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--ink-soft);
    margin-top:1px;
  }
  .stamp .mark{
    position:absolute;top:10px;right:10px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    font-weight:600;
    letter-spacing:0.08em;
    padding:3px 7px;
    border-radius:2px;
    transform:rotate(4deg);
    border:1.5px solid currentColor;
  }
  .mark.pass{color:var(--stamp-green);}
  .mark.flag{color:var(--stamp-red);}

  .deck-total-banner{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    padding:9px 14px;
    border:1px solid var(--rule);
    background:var(--card);
    margin-bottom:18px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .deck-total-banner.bad{border-color:var(--stamp-red);color:var(--stamp-red);}

  table{
    width:100%;
    border-collapse:collapse;
    background:var(--card);
    border:1px solid var(--rule);
  }
  th{
    text-align:left;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--ink-soft);
    padding:8px 10px;
    border-bottom:1.5px solid var(--ink);
    white-space:nowrap;
  }
  td{
    padding:6px 10px;
    border-bottom:1px solid var(--rule);
    font-size:13.5px;
    vertical-align:middle;
  }
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--paper-dim);}

  input[type=text], input[type=number], select{
    font-family:'Inter',sans-serif;
    font-size:13px;
    background:transparent;
    border:1px solid transparent;
    border-radius:2px;
    padding:4px 5px;
    width:100%;
    color:var(--ink);
  }
  input[type=text]:hover, input[type=number]:hover, select:hover{border-color:var(--rule);}
  input[type=text]:focus, input[type=number]:focus, select:focus{
    outline:none;border-color:var(--stamp-red);background:#fff;
  }
  input[type=number]{width:55px;text-align:center;}
  input[type=checkbox]{transform:scale(1.15);cursor:pointer;}
  td.center{text-align:center;}

  .role-badge{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    padding:2px 6px;
    border-radius:2px;
    display:inline-block;
  }
  select.role-select{cursor:pointer;}

  .del-btn{
    background:none;border:none;cursor:pointer;
    color:var(--stamp-red);font-size:15px;
    opacity:0.55;
  }
  .del-btn:hover{opacity:1;}

  .add-row{
    margin-top:12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    background:var(--ink);
    color:var(--paper);
    border:none;padding:8px 14px;
    cursor:pointer;
    border-radius:2px;
  }
  .add-row:hover{background:#31445a;}

  .section-title{
    font-family:'Fraunces',serif;
    font-size:19px;
    font-weight:600;
    margin:30px 0 10px;
    padding-bottom:6px;
    border-bottom:1px solid var(--rule);
  }
  .hint{
    font-family:'Inter',sans-serif;
    font-size:12px;
    color:var(--ink-soft);
    margin:6px 0 14px;
    line-height:1.5;
  }

  .chip-row{display:flex;flex-wrap:wrap;gap:4px;max-width:260px;}
  .chip{
    font-family:'IBM Plex Mono',monospace;
    font-size:9.5px;
    padding:3px 6px;
    border:1px solid var(--rule);
    border-radius:10px;
    cursor:pointer;
    color:var(--ink-soft);
    background:transparent;
    user-select:none;
  }
  .chip.on{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  .matrix-wrap{overflow-x:auto;margin-top:24px;}
  table.matrix th, table.matrix td{text-align:center;font-size:11.5px;}
  table.matrix th.rowhead, table.matrix td.rowhead{text-align:left;font-size:12.5px;}
  table.matrix td.yes{background:#DCE3C8;color:var(--stamp-green);font-weight:700;}

  .reset-link{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-decoration:underline;
    cursor:pointer;
    background:none;border:none;
    margin-top:30px;
  }
  .loading{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;color:var(--ink-soft);padding:40px;text-align:center;
  }
</style>
</head>

let DATA = null;
let activeTab = 'main';

async function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    DATA = raw ? JSON.parse(raw) : defaultData();
  }catch(e){
    DATA = defaultData();
  }
  render();
}

async function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
    const s = document.getElementById('save-status');
    if(s){ s.textContent = 'salvato in questo browser'; s.classList.add('dot'); }
  }catch(e){
    const s = document.getElementById('save-status');
    if(s){ s.textContent = 'salvataggio non riuscito'; s.classList.remove('dot'); }
  }
}

async function resetAll(){
  if(!confirm('Ripristinare la lista di riferimento e cancellare tutte le modifiche?')) return;
  DATA = defaultData();
  await save();
  render();
}

function sumQty(list){ return list.reduce((a,c)=>a+Number(c.qty||0),0); }

function computeRoleCounts(){
  const counts = {};
  ROLES.forEach(r=>counts[r.id]=0);
  DATA.main.forEach(c=>{ counts[c.role] = (counts[c.role]||0) + Number(c.qty||0); });
  return counts;
}

function computeCustomRules(){
  let ddv=0, ns=0, fairy=0;
  DATA.main.forEach(c=>{
    const q = Number(c.qty||0);
    if(c.type==='Monster' && c.atk!==null && c.atk!=='' && Number(c.atk)<=1500) ddv+=q;
    if(c.ns) ns+=q;
    if(c.fairy) fairy+=q;
  });
  return {ddv, ns, fairy};
}

function roleColor(roleId){
  return {
    starter:'#5B6E3A', extender:'#2F5A6B', removal:'#A8402F', defense:'#9A7A1E',
    reactive:'#7A5A9A', bomb:'#B23A2E', necessity:'#6B6B6B', other:'#999'
  }[roleId] || '#999';
}

// LOGICA INTEGRATA PER LEGGERE I FILE .YDK PRESERVANDO I RUOLI E I FLAGS PRE-IMPOSTATI
function handleYdkImport(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(evt) {
    const text = evt.target.result;
    const lines = text.split(/\r?\n/);
    
    const newMain = [];
    const newSide = [];
    const newExtra = [];
    let currentSection = null;

    const defaultMainRef = defaultData().main;

    lines.forEach(line => {
      const clean = line.trim();
      if (!clean) return;
      if (clean === '#main') { currentSection = 'main'; return; }
      if (clean === '#extra') { currentSection = 'extra'; return; }
      if (clean === '!side') { currentSection = 'side'; return; }
      
      if (/^\d+$/.test(clean)) {
        const idStr = clean;
        const poolCard = CARD_POOL.find(c => parseInt(c.id, 10) === parseInt(idStr, 10));
        
        if (poolCard) {
          let targetArr = newMain;
          if (currentSection === 'side') targetArr = newSide;
          if (currentSection === 'extra') targetArr = newExtra;

          const existing = targetArr.find(c => c.name === poolCard.name);
          if (existing) {
            existing.qty++;
          } else {
            const refCard = defaultMainRef.find(c => c.name === poolCard.name);
            let role = 'other';
            let ns = false;
            let fairy = poolCard.fairy || false;

            if (refCard) {
              role = refCard.role;
              ns = refCard.ns;
              fairy = refCard.fairy;
            } else {
              if (poolCard.type === 'Spell') role = 'extender';
              else if (poolCard.type === 'Trap') role = 'defense';
              else if (poolCard.fairy) role = 'bomb';
            }

            if (currentSection === 'main') {
              targetArr.push({
                name: poolCard.name,
                qty: 1,
                type: poolCard.type === 'ExtraMonster' ? 'Monster' : poolCard.type,
                role: role,
                atk: poolCard.atk,
                fairy: fairy,
                ns: ns
              });
            } else if (currentSection === 'side') {
              targetArr.push({
                name: poolCard.name,
                qty: 1,
                matchups: [],
                replaces: ''
              });
            } else {
              targetArr.push({
                name: poolCard.name,
                qty: 1
              });
            }
          }
        }
      }
    });

    if (newMain.length > 0 || newSide.length > 0 || newExtra.length > 0) {
      DATA.main = newMain;
      DATA.side = newSide;
      DATA.extra = newExtra;
      save();
      render();
    }
  };
  reader.readAsText(file);
}

function findInPool(name){
  const n = (name||'').trim().toLowerCase();
  return CARD_POOL.find(c=>c.name.toLowerCase()===n);
}

function legalityBadge(c){
  const pool = findInPool(c.name);
  if(!pool) return `<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-soft)">non in pool</span>`;
  const max = STATUS_MAX[pool.status];
  const over = Number(c.qty||0) > max;
  const color = over ? 'var(--stamp-red)' : 'var(--ink-soft)';
  return `<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:${color}">${STATUS_LABEL[pool.status]}${over?' ⚠':''}</span>`;
}

          ${['Monster','Spell','Trap'].map(t=>`<option ${c.type===t?'selected':''}>${t}</option>`).join('')}

      </td>
      <td>
        <select data-idx="${i}" data-field="role" class="main-field role-select" style="color:${roleColor(c.role)}">

function bindGlobal(){
  document.querySelectorAll('nav.tabs button').forEach(b=>{
    b.onclick = ()=>{ activeTab = b.dataset.tab; render(); };
  });

  document.getElementById('reset-btn').onclick = resetAll;

  const ydkInput = document.getElementById('ydk-file-input');
  if (ydkInput) ydkInput.onchange = handleYdkImport;

  document.getElementById('add-main').onclick = ()=>{
    DATA.main.push({name:'Nuova carta', qty:1, type:'Monster', role:'other', atk:null, fairy:false, ns:false});
    save(); render();
  };
  document.getElementById('add-side').onclick = ()=>{
    DATA.side.push({name:'Nuova carta', qty:1, matchups:[], replaces:''});
    save(); render();
  };
  document.getElementById('add-extra').onclick = ()=>{
    DATA.extra.push({name:'Nuova carta', qty:1});
    save(); render();
  };

  document.querySelectorAll('.del-btn').forEach(b=>{
    b.onclick = ()=>{
      const idx = Number(b.dataset.idx);
      DATA[b.dataset.list].splice(idx,1);
      save(); render();
    };
  });

  document.querySelectorAll('.main-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      let val = el.type==='checkbox' ? el.checked : el.value;
      if(field==='qty') val = Number(val);
      if(field==='atk') val = val===''? null : Number(val);
      DATA.main[idx][field] = val;
      if(field==='name'){
        const pool = findInPool(val);
        if(pool){
          DATA.main[idx].type = pool.type==='ExtraMonster' ? 'Monster' : pool.type;
          DATA.main[idx].atk = pool.atk;
          DATA.main[idx].fairy = pool.fairy;
        }
      }
      save(); render();
    };
  });

  document.querySelectorAll('.side-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      let val = el.value;
      if(field==='qty') val = Number(val);
      DATA.side[idx][field] = val;
      save(); render();
    };
  });

  document.querySelectorAll('.extra-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      let val = field==='qty' ? Number(el.value) : el.value;
      DATA.extra[idx][field] = val;
      save(); render();
    };
  });

  document.querySelectorAll('.chip').forEach(el=>{
    el.onclick = ()=>{
      const idx = Number(el.dataset.idx), m = el.dataset.matchup;
      const arr = DATA.side[idx].matchups;
      const pos = arr.indexOf(m);
      if(pos>=0) arr.splice(pos,1); else arr.push(m);
      save(); render();
    };
  });
}
