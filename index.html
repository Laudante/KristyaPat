const STORAGE_KEY = 'kristyasworn-deck-v2';
const DB_NAME = 'YugiohKaggleDB';
const DB_VERSION = 1;
const STORE_NAME = 'cards';

let db = null;

// Inizializzazione IndexedDB locale
function initDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = (e) => {
      const database = e.target.result;
      if (!database.objectStoreNames.contains(STORE_NAME)) {
        database.createObjectStore(STORE_NAME, { keyPath: 'index' });
      }
    };
    request.onsuccess = (e) => {
      db = e.target.result;
      resolve(db);
    };
    request.onerror = (e) => reject(e.target.error);
  });
}

function getCardFromDB(cardIndex) {
  return new Promise((resolve) => {
    if (!db) return resolve(null);
    const transaction = db.transaction([STORE_NAME], 'readonly');
    const store = transaction.objectStore(STORE_NAME);
    const request = store.get(String(cardIndex).trim());
    request.onsuccess = (e) => resolve(e.target.result || null);
    request.onerror = () => resolve(null);
  });
}

function parseCSVLine(text) {
  let p = '', r = []; e = false;
  for (let i = 0; i < text.length; i++) {
    let c = text[i];
    if (c === '"') { e = !e; }
    else if (c === ',' && !e) { r.push(p.trim()); p = ''; }
    else { p += c; }
  }
  r.push(p.trim());
  return r;
}

async function handleKaggleCSVImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const statusDiv = document.getElementById('save-status');
  if(statusDiv) statusDiv.textContent = 'Importazione DB in corso...';
  
  const reader = new FileReader();
  reader.onload = async function(evt) {
    const lines = evt.target.result.split(/\r?\n/);
    if(lines.length < 2) return;
    
    const headers = lines[0].split(',');
    const idxIndex = headers.indexOf('index');
    const nameIndex = headers.indexOf('name');
    const typeIndex = headers.indexOf('type');
    const subTypeIndex = headers.indexOf('sub_type');
    const attackIndex = headers.indexOf('attack');
    
    if (idxIndex === -1 || attackIndex === -1) {
      alert("Formato CSV non valido o colonne mancanti ('index', 'attack').");
      return;
    }
    
    const transaction = db.transaction([STORE_NAME], 'readwrite');
    const store = transaction.objectStore(STORE_NAME);
    
    let count = 0;
    for(let i = 1; i < lines.length; i++) {
      if(!lines[i].trim()) continue;
      const row = parseCSVLine(lines[i]);
      if(row[idxIndex]) {
        const cardObj = {
          index: String(row[idxIndex]),
          name: row[nameIndex] || 'Unknown',
          type: row[typeIndex] || 'MONSTER',
          sub_type: row[subTypeIndex] || '',
          attack: row[attackIndex] ? Number(row[attackIndex]) : null
        };
        store.put(cardObj);
        count++;
      }
    }
    
    transaction.oncomplete = () => {
      alert(`Database caricato con successo! Importate ${count} varianti di carte.`);
      if(statusDiv) { statusDiv.textContent = 'DB pronto localmente'; statusDiv.classList.add('dot'); }
      render();
    };
  };
  reader.readAsText(file);
}

let DATA = null;

async function load(){
  await initDB();
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    DATA = raw ? JSON.parse(raw) : defaultData();
    if(!DATA.matchups) DATA.matchups = defaultData().matchups;
  }catch(e){
    DATA = defaultData();
  }
  render();
}

async function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
    const s = document.getElementById('save-status');
    if(s){ s.textContent = 'salvato nel browser'; s.classList.add('dot'); }
  }catch(e){
    const s = document.getElementById('save-status');
    if(s){ s.textContent = 'errore salvataggio'; s.classList.remove('dot'); }
  }
}

async function resetAll(){
  if(!confirm('Ripristinare la configurazione di fabbrica?')) return;

}

function sumQty(list){ return list.reduce((a,c)=>a+Number(c.qty||0),0); }

function computeRoleCounts(){
  const counts = {};
  ROLES.forEach(r=>counts[r.id]=0);
  DATA.main.forEach(c=>{ counts[c.role] = (counts[c.role]||0) + Number(c.qty||0); });
  return counts;
}

function computeCustomRules(){
  let ddv=0, ns=0, fairy=0;
  DATA.main.forEach(c=>{
    const q = Number(c.qty||0);
    if(c.type==='Monster' && c.atk !== null && c.atk !== '' && Number(c.atk) <= 1500) ddv+=q;
    if(c.ns) ns+=q;
    if(c.fairy) fairy+=q;
  });
  return {ddv, ns, fairy};
}

function roleColor(roleId){
  return {
    starter:'#5B6E3A', extender:'#2F5A6B', removal:'#A8402F', defense:'#9A7A1E',
    reactive:'#7A5A9A', bomb:'#B23A2E', necessity:'#6B6B6B', other:'#999'
  }[roleId] || '#999';
}

async function handleYdkImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(evt) {
    const text = evt.target.result;
    const lines = text.split(/\r?\n/);
    const newMain = [], newSide = [], newExtra = [];
    let currentSection = null;
    const defaultMainRef = defaultData().main;

    for (let line of lines) {
      const clean = line.trim();
      if (!clean) continue;
      if (clean === '#main') { currentSection = 'main'; continue; }
      if (clean === '#extra') { currentSection = 'extra'; continue; }
      if (clean === '!side') { currentSection = 'side'; continue; }
      
      if (/^\d+$/.test(clean)) {
        // 1. Cerca nel pool base predefinito
        let poolCard = CARD_POOL.find(c => parseInt(c.id, 10) === parseInt(clean, 10));
        
        // 2. Se non c'è, lo cerca nell'IndexedDB caricato da Kaggle
        if(!poolCard) {
          const dbCard = await getCardFromDB(clean);
          if(dbCard) {
            poolCard = {
              id: dbCard.index,
              name: dbCard.name,
              type: dbCard.type.toUpperCase().includes('MONSTER') ? 'Monster' : (dbCard.type.toUpperCase().includes('TRAP')?'Trap':'Spell'),
              atk: dbCard.attack,
              fairy: dbCard.sub_type.toUpperCase().includes('FAIRY'),
              status: 'U'
            };
          }
        }

        let targetArr = currentSection === 'side' ? newSide : (currentSection === 'extra' ? newExtra : newMain);
        
        if (poolCard) {
          const existing = targetArr.find(c => c.name === poolCard.name);
          if (existing) { existing.qty++; } else {
            const refCard = defaultMainRef.find(c => c.name === poolCard.name);
            let role = refCard ? refCard.role : (poolCard.type==='Spell'?'extender':(poolCard.type==='Trap'?'defense':'other'));
            let ns = refCard ? refCard.ns : false;
            
            if(currentSection === 'main'){
              targetArr.push({ name: poolCard.name, qty: 1, type: poolCard.type, role, atk: poolCard.atk, fairy: poolCard.fairy||false, ns });
            } else if(currentSection === 'side'){
              targetArr.push({ name: poolCard.name, qty: 1, matchups: [], replaces: '', sideStatus: 'both' });
            } else {
              targetArr.push({ name: poolCard.name, qty: 1, role: 'none' });
            }
          }
        } else {
          // Fallback se non si trova da nessuna parte
          const existing = targetArr.find(c => c.name === ('ID: ' + clean));
          if (existing) { existing.qty++; } else {
            if(currentSection === 'main') {
              targetArr.push({ name: 'ID: ' + clean, qty: 1, type: 'Monster', role: 'other', atk: null, fairy: false, ns: false });
            } else if(currentSection === 'side') {
              targetArr.push({ name: 'ID: ' + clean, qty: 1, matchups: [], replaces: '', sideStatus: 'both' });
            } else {
              targetArr.push({ name: 'ID: ' + clean, qty: 1, role: 'none' });
            }
          }
        }
      }
    }
    
    if (newMain.length || newSide.length || newExtra.length) {
      DATA.main = newMain; DATA.side = newSide; DATA.extra = newExtra;
      save(); render();
    }
  };
  reader.readAsText(file);
}

function downloadKdeOfficialDecklist() {
  let output = "=== KONAMI OFFICIAL DECKLIST FORM ===\n";
  output += `Data Export: ${new Date().toLocaleDateString('it-IT')}\n\n`;
  
  output += `MAIN DECK (${sumQty(DATA.main)} carte):\n`;
  DATA.main.forEach(c => { output += `${c.qty}x ${c.name}\n`; });
  
  output += `\nSIDE DECK (${sumQty(DATA.side)} carte):\n`;
  DATA.side.forEach(c => { output += `${c.qty}x ${c.name}\n`; });
  
  output += `\nEXTRA DECK (${sumQty(DATA.extra)} carte):\n`;
  DATA.extra.forEach(c => { output += `${c.qty}x ${c.name}\n`; });

  const blob = new Blob([output], { type: 'text/plain;charset=utf-8;' });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.setAttribute("download", "official_kde_decklist.txt");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function downloadSideCSV(){
  let csv = "Carta,Quantita,Andamento,Sostituisce,Matchup Associati\n";
  DATA.side.forEach(c => {
    csv += `"${c.name}",${c.qty},"${c.sideStatus || 'both'}","${c.replaces || ''}","${c.matchups.join(' | ')}"\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.setAttribute("download", "kristyasworn_side_patterns.csv");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function addNewMatchup(){
  const name = prompt("Inserisci il nome del nuovo Matchup Target:");
  if(!name) return;
  const clean = name.trim();
  if(clean && !DATA.matchups.includes(clean)){
    DATA.matchups.push(clean);
    save(); render();
  }
}

function findInPool(name){
  return CARD_POOL.find(c=>c.name.toLowerCase()===(name||'').trim().toLowerCase());
}

function legalityBadge(c){
  const pool = findInPool(c.name);
  if(!pool) return `<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-soft)">Verificato via DB</span>`;
  const over = Number(c.qty||0) > STATUS_MAX[pool.status];
  return `<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:${over?'var(--stamp-red)':'var(--ink-soft)'}">${STATUS_LABEL[pool.status]}${over?' ⚠':''}</span>`;
}

function renderMainRows(){
  const tbody = document.getElementById('main-tbody');
  if(!tbody) return;
  tbody.innerHTML = DATA.main.map((c,i)=>`
    <tr>
      <td><input type="text" value="${c.name}" data-idx="${i}" data-field="name" class="main-field"></td>
      <td class="center"><input type="number" min="0" value="${c.qty}" data-idx="${i}" data-field="qty" class="main-field"></td>
      <td><select data-idx="${i}" data-field="type" class="main-field">${['Monster','Spell','Trap'].map(t=>`<option ${c.type===t?'selected':''}>${t}</option>`).join('')}</select></td>
      <td><select data-idx="${i}" data-field="role" class="main-field role-select" style="color:${roleColor(c.role)}">${ROLES.map(r=>`<option value="${r.id}" ${c.role===r.id?'selected':''}>${r.label}</option>`).join('')}</select></td>
      <td><input type="number" value="${c.atk===null?'':c.atk}" data-idx="${i}" data-field="atk" class="main-field" ${c.type!=='Monster'?'disabled':''}></td>
      <td class="center"><input type="checkbox" ${c.fairy?'checked':''} data-idx="${i}" data-field="fairy" class="main-field"></td>
      <td class="center"><input type="checkbox" ${c.ns?'checked':''} data-idx="${i}" data-field="ns" class="main-field"></td>
      <td>${legalityBadge(c)}</td>
      <td class="center"><button class="del-btn" data-idx="${i}" data-list="main">✕</button></td>
    </tr>
  `).join('');
}

function renderSideRows(){
  const tbody = document.getElementById('side-tbody');
  if(!tbody) return;

  const filtered = DATA.side.filter(c => {
    if(activeSideFilter === 'all') return true;
    if(activeSideFilter === '1st') return c.sideStatus === '1st' || c.sideStatus === 'both';
    if(activeSideFilter === '2nd') return c.sideStatus === '2nd' || c.sideStatus === 'both';
    return c.matchups.includes(activeSideFilter);
  });

  tbody.innerHTML = filtered.map((c,i)=>{
    const realIndex = DATA.side.indexOf(c);
    return `
    <tr>
      <td><input type="text" value="${c.name}" data-idx="${realIndex}" data-field="name" class="side-field"></td>
      <td class="center"><input type="number" min="0" value="${c.qty}" data-idx="${realIndex}" data-field="qty" class="side-field"></td>
      <td>
        <select data-idx="${realIndex}" data-field="sideStatus" class="side-field">
          <option value="both" ${c.sideStatus==='both'?'selected':''}>Sia 1st che 2nd</option>
          <option value="1st" ${c.sideStatus==='1st'?'selected':''}>Solo Going 1st</option>
          <option value="2nd" ${c.sideStatus==='2nd'?'selected':''}>Solo Going 2nd</option>
        </select>
      </td>
      <td>
        <div class="chip-row">
          ${DATA.matchups.map(m=>`<button class="chip ${c.matchups.includes(m)?'on':''}" data-idx="${realIndex}" data-matchup="${m}">${m}</button>`).join('')}
        </div>
      </td>
      <td><input type="text" value="${c.replaces||''}" data-idx="${realIndex}" data-field="replaces" class="side-field"></td>
      <td class="center"><button class="del-btn" data-idx="${realIndex}" data-list="side">✕</button></td>
    </tr>
  `}).join('');
}

function renderExtraRows(){
  const tbody = document.getElementById('extra-tbody');
  if(!tbody) return;
  tbody.innerHTML = DATA.extra.map((c,i)=>`
    <tr>
      <td><input type="text" value="${c.name}" data-idx="${i}" data-field="name" class="extra-field"></td>
      <td class="center"><input type="number" min="0" value="${c.qty}" data-idx="${i}" data-field="qty" class="extra-field"></td>
      <td>
        <select data-idx="${i}" data-field="role" class="extra-field">
          ${EXTRA_ROLES.map(r=>`<option value="${r.id}" ${(c.role||'none')===r.id?'selected':''}>${r.label}</option>`).join('')}
        </select>
      </td>
      <td class="center"><button class="del-btn" data-idx="${i}" data-list="extra">✕</button></td>
    </tr>
  `).join('');
}

function bindGlobal(){
  document.querySelectorAll('nav.tabs button').forEach(b=>{
    b.onclick = ()=>{ activeTab = b.dataset.tab; render(); };
  });

  document.getElementById('reset-btn').onclick = resetAll;
  
  const csvInput = document.getElementById('kaggle-csv-input');
  if (csvInput) csvInput.onchange = handleKaggleCSVImport;

  const ydkInput = document.getElementById('ydk-file-input');
  if (ydkInput) ydkInput.onchange = handleYdkImport;

  const kdeExportBtn = document.getElementById('kde-export-btn');
  if (kdeExportBtn) kdeExportBtn.onclick = downloadKdeOfficialDecklist;

  const addMatchupBtn = document.getElementById('add-matchup-btn');
  if(addMatchupBtn) addMatchupBtn.onclick = addNewMatchup;

  const csvBtn = document.getElementById('download-csv-btn');
  if(csvBtn) csvBtn.onclick = downloadSideCSV;

  document.querySelectorAll('.side-filter-bar button[data-filter]').forEach(b=>{
    b.onclick = ()=>{ activeSideFilter = b.dataset.filter; renderSideRows(); document.querySelectorAll('.side-filter-bar button[data-filter]').forEach(x=>x.classList.remove('active')); b.classList.add('active'); };
  });

  document.getElementById('add-main').onclick = ()=>{
    DATA.main.push({name:'Nuova carta', qty:1, type:'Monster', role:'other', atk:null, fairy:false, ns:false});
    save(); render();
  };
  document.getElementById('add-side').onclick = ()=>{
    DATA.side.push({name:'Nuova carta', qty:1, matchups:[], replaces:'', sideStatus:'both'});
    save(); render();
  };
  document.getElementById('add-extra').onclick = ()=>{
    DATA.extra.push({name:'Nuova carta', qty:1, role:'none'});
    save(); render();
  };

  document.querySelectorAll('.del-btn').forEach(b=>{
    b.onclick = ()=>{
      DATA[b.dataset.list].splice(Number(b.dataset.idx),1);
      save(); render();
    };
  });

  document.querySelectorAll('.main-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      let val = el.type==='checkbox' ? el.checked : el.value;
      if(field==='qty' || field==='atk') val = val===''? null : Number(val);
      DATA.main[idx][field] = val;
      save(); render();
    };
  });

  document.querySelectorAll('.side-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      DATA.side[idx][field] = field==='qty' ? Number(el.value) : el.value;
      save(); render();
    };
  });

  document.querySelectorAll('.extra-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      DATA.extra[idx][field] = field==='qty' ? Number(el.value) : el.value;
      save(); render();
    };
  });

  document.querySelectorAll('.chip').forEach(el=>{
    el.onclick = ()=>{
      const idx = Number(el.dataset.idx), m = el.dataset.matchup;
      const arr = DATA.side[idx].matchups;
      const pos = arr.indexOf(m);
      if(pos>=0) arr.splice(pos,1); else arr.push(m);
      save(); render();
    };
  });
}

load();
</script>
