<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kristyasworn — Registro Edison (CSV NATIVO 2010)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1ECDC;
    --paper-dim:#E7E0CB;
    --ink:#1E2A38;
    --ink-soft:#4B5A6B;
    --rule:#C9BE9E;
    --stamp-red:#A8402F;
    --stamp-green:#5B6E3A;
    --stamp-gold:#9A7A1E;
    --card:#FAF7EE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

  header{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;margin-bottom:6px;flex-wrap:wrap;gap:10px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:30px;
    margin:0;
    letter-spacing:-0.01em;
  }
  .subtitle{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:4px;
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  .save-status{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-align:right;
  }
  .save-status.dot::before{
    content:'●';color:var(--stamp-green);margin-right:5px;
  }

  nav.tabs{
    display:flex;gap:2px;margin:22px 0 20px;
    border-bottom:1px solid var(--rule);
  }
  nav.tabs button{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    background:none;border:none;
    padding:10px 16px;
    cursor:pointer;
    color:var(--ink-soft);
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
  }
  nav.tabs button.active{
    color:var(--ink);
    border-bottom:2px solid var(--stamp-red);
    font-weight:600;
  }

  .panel{display:none;}
  .panel.active{display:block;}

  .stamps{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin-bottom:26px;
  }
  .stamp{
    background:var(--card);
    border:1px solid var(--rule);
    border-radius:2px;
    padding:12px 14px;
    position:relative;
    overflow:hidden;
  }
  .stamp .label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink-soft);
  }
  .stamp .value{
    font-family:'Fraunces',serif;
    font-size:26px;
    font-weight:600;
    margin-top:2px;
  }
  .stamp .target{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--ink-soft);
    margin-top:1px;
  }
  .stamp .mark{
    position:absolute;top:10px;right:10px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    font-weight:600;
    letter-spacing:0.08em;
    padding:3px 7px;
    border-radius:2px;
    transform:rotate(4deg);
    border:1.5px solid currentColor;
  }
  .mark.pass{color:var(--stamp-green);}
  .mark.flag{color:var(--stamp-red);}

  .deck-total-banner{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    padding:9px 14px;
    border:1px solid var(--rule);
    background:var(--card);
    margin-bottom:18px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .deck-total-banner.bad{border-color:var(--stamp-red);color:var(--stamp-red);}

  table{
    width:100%;
    border-collapse:collapse;
    background:var(--card);
    border:1px solid var(--rule);
  }
  th{
    text-align:left;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--ink-soft);
    padding:8px 10px;
    border-bottom:1.5px solid var(--ink);
    white-space:nowrap;
  }
  td{
    padding:6px 10px;
    border-bottom:1px solid var(--rule);
    font-size:13.5px;
    vertical-align:middle;
  }
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--paper-dim);}

  input[type=text], input[type=number], select{
    font-family:'Inter',sans-serif;
    font-size:13px;
    background:transparent;
    border:1px solid transparent;
    border-radius:2px;
    padding:4px 5px;
    width:100%;
    color:var(--ink);
  }
  input[type=text]:hover, input[type=number]:hover, select:hover{border-color:var(--rule);}
  input[type=text]:focus, input[type=number]:focus, select:focus{
    outline:none;border-color:var(--stamp-red);background:#fff;
  }
  input[type=number]{width:55px;text-align:center;}
  input[type=checkbox]{transform:scale(1.15);cursor:pointer;}
  td.center{text-align:center;}

  .del-btn{
    background:none;border:none;cursor:pointer;
    color:var(--stamp-red);font-size:15px;
    opacity:0.55;
  }
  .del-btn:hover{opacity:1;}

  .add-row{
    margin-top:12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    background:var(--ink);
    color:var(--paper);
    border:none;padding:8px 14px;
    cursor:pointer;
    border-radius:2px;
  }
  .add-row:hover{background:#31445a;}

  .section-title{
    font-family:'Fraunces',serif;
    font-size:19px;
    font-weight:600;
    margin:30px 0 10px;
    padding-bottom:6px;
    border-bottom:1px solid var(--rule);
  }

  .btn-action {
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    padding:5px 10px;
    border:none;
    border-radius:2px;
    cursor:pointer;
    text-transform:uppercase;
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const STORAGE_KEY = 'kristyasworn-deck-v4';
let CARD_POOL_MAP = new Map(); // Mappa [nome_carta -> {id, name, type, atk, fairy}]
let CARD_ID_MAP = new Map();   // Mappa [id_carta -> {id, name, type, atk, fairy}]

const ROLES = [
  {id:'starter', label:'Starter', min:11, max:13},
  {id:'extender', label:'Extender', min:12, max:14},
  {id:'removal', label:'Rimozione', min:0, max:3},
  {id:'defense', label:'Difesa', min:5, max:7},
  {id:'reactive', label:'Reactive Ext.', min:0, max:3},
  {id:'bomb', label:'Bomba', min:2, max:3},
  {id:'necessity', label:'Necessità', min:0, max:1},
  {id:'other', label:'Altro', min:null, max:null},
];

const EXTRA_ROLES = [
  {id:'none', label:'Nessuno'},
  {id:'remover', label:'Rimozione/Utility'},
  {id:'beater', label:'Chiusura/Beater'},
  {id:'negator', label:'Controllo/Negate'},
  {id:'tech', label:'Situazionale/Tech'}
];

function defaultData(){
  return {
    main: [
      {name:'Archlord Kristya', qty:3, type:'Monster', role:'bomb', atk:2800, fairy:true, ns:false},
      {name:'Honest', qty:2, type:'Monster', role:'defense', atk:1400, fairy:true, ns:false},
      {name:'Charge of the Light Brigade', qty:1, type:'Spell', role:'starter', atk:null, fairy:false, ns:false},
      {name:'Solar Recharge', qty:3, type:'Spell', role:'extender', atk:null, fairy:false, ns:false},
    ],
    side: [],
    extra: []
  };
}

let DATA = null;
let activeTab = 'main';

async function initCardPool() {
  try {
    const res = await fetch('edison_cardpool_2010.csv');
    if (!res.ok) throw new Error("HTTP " + res.status);
    const csvText = await res.text();
    parseCSV(csvText);
  } catch (err) {
    console.warn("Caricamento CSV automatico non riuscito, pronto per l'upload manuale del CSV Edison.");
  }
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  if (lines.length < 2) return;
  
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim().toLowerCase());
  const idxIndex = headers.indexOf('index');
  const idxName = headers.indexOf('name');
  const idxType = headers.indexOf('type');
  const idxAtk = headers.indexOf('attack');
  const idxRace = headers.indexOf('race');
  const idxSubtype = headers.indexOf('sub_type');

  CARD_POOL_MAP.clear();
  CARD_ID_MAP.clear();

  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    
    // Regex per gestire correttamente i campi CSV con virgole e virgolette
    const row = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || lines[i].split(',');
    const cleanRow = row.map(cell => cell.replace(/^"|"$/g, '').trim());

    const name = cleanRow[idxName] || '';
    if (!name) continue;

    const id = cleanRow[idxIndex] || '';
    const rawType = cleanRow[idxType] || '';
    let cardType = 'Monster';
    if (rawType.toLowerCase().includes('spell')) cardType = 'Spell';
    else if (rawType.toLowerCase().includes('trap')) cardType = 'Trap';

    const rawAtk = cleanRow[idxAtk];
    const atk = (rawAtk !== undefined && rawAtk !== '' && !isNaN(rawAtk)) ? parseInt(rawAtk, 10) : null;
    
    const race = cleanRow[idxRace] ? cleanRow[idxRace].toLowerCase() : '';
    const subtype = cleanRow[idxSubtype] ? cleanRow[idxSubtype].toLowerCase() : '';
    const isFairy = race.includes('fairy') || subtype.includes('fairy');

    const cardObj = { id, name, type: cardType, atk, fairy: isFairy };
    CARD_POOL_MAP.set(name.toLowerCase(), cardObj);
    if (id) CARD_ID_MAP.set(id, cardObj);
  }

  const statusEl = document.getElementById('csv-status');
  if (statusEl) statusEl.textContent = `CSV Caricato: ${CARD_POOL_MAP.size} carte 2010`;
  render();
}

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    DATA = raw ? JSON.parse(raw) : defaultData();
  }catch(e){
    DATA = defaultData();
  }
  initCardPool().then(() => render());
}

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
  const s = document.getElementById('save-status');
  if(s){ s.textContent = 'salvato'; s.classList.add('dot'); }
}

function sumQty(list){ return list.reduce((a,c)=>a+Number(c.qty||0),0); }

function computeRoleCounts(){
  const counts = {};
  ROLES.forEach(r=>counts[r.id]=0);
  DATA.main.forEach(c=>{ counts[c.role] = (counts[c.role]||0) + Number(c.qty||0); });
  return counts;
}

function computeCustomRules(){
  let ddv=0, ns=0, fairy=0;
  DATA.main.forEach(c=>{
    const q = Number(c.qty||0);
    if(c.type==='Monster' && c.atk !== null && c.atk !== '' && Number(c.atk) <= 1500) ddv+=q;
    if(c.ns) ns+=q;
    if(c.fairy) fairy+=q;
  });
  return {ddv, ns, fairy};
}

function handleCsvManualUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    parseCSV(evt.target.result);
  };
  reader.readAsText(file);
}

function handleYdkImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    const lines = evt.target.result.split(/\r?\n/);
    const newMain = [], newSide = [], newExtra = [];
    let currentSection = null;

    lines.forEach(line => {
      const clean = line.trim();
      if (!clean) return;
      if (clean === '#main') { currentSection = 'main'; return; }
      if (clean === '#extra') { currentSection = 'extra'; return; }
      if (clean === '!side') { currentSection = 'side'; return; }
      
      if (/^\d+$/.test(clean)) {
        const poolCard = CARD_ID_MAP.get(clean);
        let targetArr = currentSection === 'side' ? newSide : (currentSection === 'extra' ? newExtra : newMain);
        
        if (poolCard) {
          const existing = targetArr.find(c => c.name === poolCard.name);
          if (existing) { existing.qty++; } else {
            let role = poolCard.type==='Spell'?'extender':(poolCard.type==='Trap'?'defense':'other');
            if(currentSection === 'main'){
              targetArr.push({ name: poolCard.name, qty: 1, type: poolCard.type, role, atk: poolCard.atk, fairy: poolCard.fairy, ns: false });
            } else if(currentSection === 'side'){
              targetArr.push({ name: poolCard.name, qty: 1, replaces: '', sideStatus: 'both' });
            } else {
              targetArr.push({ name: poolCard.name, qty: 1, role: 'none' });
            }
          }
        } else {
          const existing = targetArr.find(c => c.name === ('ID: ' + clean));
          if (existing) { existing.qty++; } else {
            if(currentSection === 'main') {
              targetArr.push({ name: 'ID: ' + clean, qty: 1, type: 'Monster', role: 'other', atk: null, fairy: false, ns: false });
            } else if(currentSection === 'side') {
              targetArr.push({ name: 'ID: ' + clean, qty: 1, replaces: '', sideStatus: 'both' });
            } else {
              targetArr.push({ name: 'ID: ' + clean, qty: 1, role: 'none' });
            }
          }
        }
      }
    });
    
    if (newMain.length || newSide.length || newExtra.length) {
      DATA.main = newMain; DATA.side = newSide; DATA.extra = newExtra;
      save(); render();
    }
  };
  reader.readAsText(file);
}

function downloadKdeOfficialDecklist() {
  let output = "=== KONAMI OFFICIAL DECKLIST FORM ===\n";
  output += `Data Export: ${new Date().toLocaleDateString('it-IT')}\n\n`;
  output += `MAIN DECK (${sumQty(DATA.main)} carte):\n`;
  DATA.main.forEach(c => { output += `${c.qty}x ${c.name}\n`; });
  output += `\nSIDE DECK (${sumQty(DATA.side)} carte):\n`;
  DATA.side.forEach(c => { output += `${c.qty}x ${c.name}\n`; });
  output += `\nEXTRA DECK (${sumQty(DATA.extra)} carte):\n`;
  DATA.extra.forEach(c => { output += `${c.qty}x ${c.name}\n`; });

  const blob = new Blob([output], { type: 'text/plain;charset=utf-8;' });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.setAttribute("download", "official_kde_decklist.txt");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function render(){
  const app = document.getElementById('app');
  const mainTotal = sumQty(DATA.main);
  const roleCounts = computeRoleCounts();
  const custom = computeCustomRules();

  app.innerHTML = `
    <header>
      <div>
        <h1>Kristyasworn — Registro Edison</h1>
        <div class="subtitle" id="csv-status">Database 2010 (${CARD_POOL_MAP.size} carte filtrate)</div>
      </div>
      <div style="display: flex; flex-direction: row; align-items: flex-end; gap: 8px;">
        <div class="save-status dot" id="save-status">salvato</div>
        <label class="btn-action" style="background:var(--ink-soft); color:white;">
          📁 Carica CSV 2010
          <input type="file" id="csv-file-input" accept=".csv" style="display:none;">
        </label>
        <label class="btn-action" style="background:var(--ink); color:var(--paper);">
          ↑ Importa .ydk
          <input type="file" id="ydk-file-input" accept=".ydk" style="display:none;">
        </label>
        <button id="kde-export-btn" class="btn-action" style="background:var(--stamp-red); color:white;">
          ↓ Export KDE (.txt)
        </button>
      </div>
    </header>

    <nav class="tabs">
      <button data-tab="main" class="${activeTab==='main'?'active':''}">Main Deck</button>
      <button data-tab="side" class="${activeTab==='side'?'active':''}">Side Patterns</button>
      <button data-tab="extra" class="${activeTab==='extra'?'active':''}">Extra Deck</button>
    </nav>

    <div class="panel ${activeTab==='main'?'active':''}">
      <div class="deck-total-banner ${mainTotal!==40?'bad':''}">
        <span>MAIN DECK TOTAL</span>
        <span>${mainTotal} / 40</span>
      </div>

      <div class="stamps">
        ${ROLES.filter(r=>r.id!=='other').map(r=>{
          const v = roleCounts[r.id]||0;
          const pass = v>=r.min && v<=r.max;
          return `<div class="stamp">
            <div class="label">${r.label}</div>
            <div class="value">${v}</div>
            <div class="target">target ${r.min===r.max? r.min : r.min+'–'+r.max}</div>
            <div class="mark ${pass?'pass':'flag'}">${pass?'OK':'FUORI'}</div>
          </div>`;
        }).join('')}
        <div class="stamp">
          <div class="label">DDV Target (ATK≤1500)</div>
          <div class="value">${custom.ddv}</div>
          <div class="target">max 12</div>
          <div class="mark ${custom.ddv<=12?'pass':'flag'}">${custom.ddv<=12?'OK':'FUORI'}</div>
        </div>
        <div class="stamp">
          <div class="label">Starter Normal Summon</div>
          <div class="value">${custom.ns}</div>
          <div class="target">max 9</div>
          <div class="mark ${custom.ns<=9?'pass':'flag'}">${custom.ns<=9?'OK':'FUORI'}</div>
        </div>
        <div class="stamp">
          <div class="label">Fedeli (Fairy)</div>
          <div class="value">${custom.fairy}</div>
          <div class="target">8</div>
          <div class="mark ${custom.fairy===8?'pass':'flag'}">${custom.fairy===8?'OK':'FUORI'}</div>
        </div>
      </div>

      <div class="section-title">Carte Main Deck</div>
      <table>
        <thead><tr>
          <th style="width:30%">Nome</th><th>Qtà</th><th>Tipo</th><th>Ruolo</th><th>ATK</th><th>Fata</th><th>NS</th><th></th>
        </tr></thead>
        <tbody id="main-tbody"></tbody>
      </table>
      <button class="add-row" id="add-main">+ aggiungi carta</button>
    </div>

    <div class="panel ${activeTab==='side'?'active':''}">
      <div class="section-title">Side Patterns</div>
      <table>
        <thead><tr><th style="width:30%">Nome</th><th>Qtà</th><th>Andamento</th><th>Sostituisce (main)</th><th></th></tr></thead>
        <tbody id="side-tbody"></tbody>
      </table>
      <button class="add-row" id="add-side">+ aggiungi carta side</button>
    </div>

    <div class="panel ${activeTab==='extra'?'active':''}">
      <div class="section-title">Extra Deck</div>
      <table>
        <thead><tr><th style="width:50%">Nome</th><th>Qtà</th><th>Ruolo Funzionale</th><th></th></tr></thead>
        <tbody id="extra-tbody"></tbody>
      </table>
      <button class="add-row" id="add-extra">+ aggiungi carta extra</button>
    </div>

    <datalist id="edison-datalist">
      ${Array.from(CARD_POOL_MAP.values()).map(c=>`<option value="${c.name}">`).join('')}
    </datalist>
  `;

  renderMainRows();
  renderSideRows();
  renderExtraRows();
  bindGlobal();
}

function renderMainRows(){
  const tbody = document.getElementById('main-tbody');
  if(!tbody) return;
  tbody.innerHTML = DATA.main.map((c,i)=>`
    <tr>
      <td><input type="text" list="edison-datalist" value="${c.name}" data-idx="${i}" data-field="name" class="main-field card-name-input"></td>
      <td class="center"><input type="number" min="0" value="${c.qty}" data-idx="${i}" data-field="qty" class="main-field"></td>
      <td><select data-idx="${i}" data-field="type" class="main-field">${['Monster','Spell','Trap'].map(t=>`<option ${c.type===t?'selected':''}>${t}</option>`).join('')}</select></td>
      <td><select data-idx="${i}" data-field="role" class="main-field role-select">${ROLES.map(r=>`<option value="${r.id}" ${c.role===r.id?'selected':''}>${r.label}</option>`).join('')}</select></td>
      <td><input type="number" value="${c.atk===null||c.atk===undefined?'':c.atk}" data-idx="${i}" data-field="atk" class="main-field" ${c.type!=='Monster'?'disabled':''}></td>
      <td class="center"><input type="checkbox" ${c.fairy?'checked':''} data-idx="${i}" data-field="fairy" class="main-field"></td>
      <td class="center"><input type="checkbox" ${c.ns?'checked':''} data-idx="${i}" data-field="ns" class="main-field"></td>
      <td class="center"><button class="del-btn" data-idx="${i}" data-list="main">✕</button></td>
    </tr>
  `).join('');
}

function renderSideRows(){
  const tbody = document.getElementById('side-tbody');
  if(!tbody) return;
  tbody.innerHTML = DATA.side.map((c,i)=>`
    <tr>
      <td><input type="text" list="edison-datalist" value="${c.name}" data-idx="${i}" data-field="name" class="side-field card-name-input"></td>
      <td class="center"><input type="number" min="0" value="${c.qty}" data-idx="${i}" data-field="qty" class="side-field"></td>
      <td>
        <select data-idx="${i}" data-field="sideStatus" class="side-field">
          <option value="both" ${c.sideStatus==='both'?'selected':''}>Sia 1st che 2nd</option>
          <option value="1st" ${c.sideStatus==='1st'?'selected':''}>Solo Going 1st</option>
          <option value="2nd" ${c.sideStatus==='2nd'?'selected':''}>Solo Going 2nd</option>
        </select>
      </td>
      <td><input type="text" value="${c.replaces||''}" data-idx="${i}" data-field="replaces" class="side-field"></td>
      <td class="center"><button class="del-btn" data-idx="${i}" data-list="side">✕</button></td>
    </tr>
  `).join('');
}

function renderExtraRows(){
  const tbody = document.getElementById('extra-tbody');
  if(!tbody) return;
  tbody.innerHTML = DATA.extra.map((c,i)=>`
    <tr>
      <td><input type="text" list="edison-datalist" value="${c.name}" data-idx="${i}" data-field="name" class="extra-field card-name-input"></td>
      <td class="center"><input type="number" min="0" value="${c.qty}" data-idx="${i}" data-field="qty" class="extra-field"></td>
      <td>
        <select data-idx="${i}" data-field="role" class="extra-field">
          ${EXTRA_ROLES.map(r=>`<option value="${r.id}" ${(c.role||'none')===r.id?'selected':''}>${r.label}</option>`).join('')}
        </select>
      </td>
      <td class="center"><button class="del-btn" data-idx="${i}" data-list="extra">✕</button></td>
    </tr>
  `).join('');
}

function bindGlobal(){
  document.querySelectorAll('nav.tabs button').forEach(b=>{
    b.onclick = ()=>{ activeTab = b.dataset.tab; render(); };
  });

  const csvInput = document.getElementById('csv-file-input');
  if (csvInput) csvInput.onchange = handleCsvManualUpload;

  const ydkInput = document.getElementById('ydk-file-input');
  if (ydkInput) ydkInput.onchange = handleYdkImport;

  const kdeExportBtn = document.getElementById('kde-export-btn');
  if (kdeExportBtn) kdeExportBtn.onclick = downloadKdeOfficialDecklist;

  document.getElementById('add-main').onclick = ()=>{
    DATA.main.push({name:'', qty:1, type:'Monster', role:'other', atk:null, fairy:false, ns:false});
    save(); render();
  };
  document.getElementById('add-side').onclick = ()=>{
    DATA.side.push({name:'', qty:1, replaces:'', sideStatus:'both'});
    save(); render();
  };
  document.getElementById('add-extra').onclick = ()=>{
    DATA.extra.push({name:'', qty:1, role:'none'});
    save(); render();
  };

  document.querySelectorAll('.del-btn').forEach(b=>{
    b.onclick = ()=>{
      DATA[b.dataset.list].splice(Number(b.dataset.idx),1);
      save(); render();
    };
  });

  document.querySelectorAll('.main-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      let val = el.type==='checkbox' ? el.checked : el.value;
      if(field==='qty' || field==='atk') val = val===''? null : Number(val);
      
      DATA.main[idx][field] = val;
      
      if(field==='name'){
        const found = CARD_POOL_MAP.get(String(val).toLowerCase().trim());
        if(found){
          DATA.main[idx].type = found.type;
          DATA.main[idx].atk = found.atk;
          DATA.main[idx].fairy = found.fairy;
        }
      }
      save(); render();
    };
  });

  document.querySelectorAll('.side-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      DATA.side[idx][field] = field==='qty' ? Number(el.value) : el.value;
      save(); render();
    };
  });

  document.querySelectorAll('.extra-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      DATA.extra[idx][field] = field==='qty' ? Number(el.value) : el.value;
      save(); render();
    };
  });
}

load();
</script>
</body>
</html>
