<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kristyasworn — Registro di Costruzione Avanzato</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1ECDC;
    --paper-dim:#E7E0CB;
    --ink:#1E2A38;
    --ink-soft:#4B5A6B;
    --rule:#C9BE9E;
    --stamp-red:#A8402F;
    --stamp-green:#5B6E3A;
    --stamp-gold:#9A7A1E;
    --card:#FAF7EE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

  header{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;margin-bottom:6px;flex-wrap:wrap;gap:10px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:30px;
    margin:0;
    letter-spacing:-0.01em;
  }
  .subtitle{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:4px;
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  .save-status{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-align:right;
  }
  .save-status.dot::before{
    content:'●';color:var(--stamp-green);margin-right:5px;
  }

  nav.tabs{
    display:flex;gap:2px;margin:22px 0 20px;
    border-bottom:1px solid var(--rule);
  }
  nav.tabs button{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    background:none;border:none;
    padding:10px 16px;
    cursor:pointer;
    color:var(--ink-soft);
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
  }
  nav.tabs button.active{
    color:var(--ink);
    border-bottom:2px solid var(--stamp-red);
    font-weight:600;
  }

  .panel{display:none;}
  .panel.active{display:block;}

  .stamps{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin-bottom:26px;
  }
  .stamp{
    background:var(--card);
    border:1px solid var(--rule);
    border-radius:2px;
    padding:12px 14px;
    position:relative;
    overflow:hidden;
  }
  .stamp .label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink-soft);
  }
  .stamp .value{
    font-family:'Fraunces',serif;
    font-size:26px;
    font-weight:600;
    margin-top:2px;
  }
  .stamp .target{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--ink-soft);
    margin-top:1px;
  }
  .stamp .mark{
    position:absolute;top:10px;right:10px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    font-weight:600;
    letter-spacing:0.08em;
    padding:3px 7px;
    border-radius:2px;
    transform:rotate(4deg);
    border:1.5px solid currentColor;
  }
  .mark.pass{color:var(--stamp-green);}
  .mark.flag{color:var(--stamp-red);}

  /* Box Personalizzati Richiesti */
  .stamp.box-purple { background-color: #F3EAF9; border-color: #B399D4; }
  .stamp.box-purple .label, .stamp.box-purple .target { color: #6A449B; }
  .stamp.box-purple .mark.pass { color: #6A449B; border-color: #6A449B; }

  .stamp.box-brown { background-color: #F7EFE5; border-color: #CDA67F; }
  .stamp.box-brown .label, .stamp.box-brown .target { color: #785129; }
  .stamp.box-brown .mark.pass { color: #785129; border-color: #785129; }

  .stamp.box-green { background-color: #EFF5E9; border-color: #A3C997; }
  .stamp.box-green .label, .stamp.box-green .target { color: #436F37; }
  .stamp.box-green .mark.pass { color: #436F37; border-color: #436F37; }

  .deck-total-banner{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    padding:9px 14px;
    border:1px solid var(--rule);
    background:var(--card);
    margin-bottom:18px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .deck-total-banner.bad{border-color:var(--stamp-red);color:var(--stamp-red);}

  table{
    width:100%;
    border-collapse:collapse;
    background:var(--card);
    border:1px solid var(--rule);
    margin-bottom:20px;
  }
  th{
    text-align:left;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--ink-soft);
    padding:8px 10px;
    border-bottom:1.5px solid var(--ink);
    white-space:nowrap;
  }
  td{
    padding:6px 10px;
    border-bottom:1px solid var(--rule);
    font-size:13.5px;
    vertical-align:middle;
  }
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--paper-dim);}

  input[type=text], input[type=number], select{
    font-family:'Inter',sans-serif;
    font-size:13px;
    background:transparent;
    border:1px solid transparent;
    border-radius:2px;
    padding:4px 5px;
    width:100%;
    color:var(--ink);
  }
  input[type=text]:hover, input[type=number]:hover, select:hover{border-color:var(--rule);}
  input[type=text]:focus, input[type=number]:focus, select:focus{
    outline:none;border-color:var(--stamp-red);background:#fff;
  }
  input[type=number]{width:55px;text-align:center;}
  input[type=checkbox]{transform:scale(1.15);cursor:pointer;}
  td.center{text-align:center;}

  .add-row{
    margin-top:12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    background:var(--ink);
    color:var(--paper);
    border:none;padding:8px 14px;
    cursor:pointer;
    border-radius:2px;
  }
  .add-row:hover{background:#31445a;}

  .section-title{
    font-family:'Fraunces',serif;
    font-size:19px;
    font-weight:600;
    margin:30px 0 10px;
    padding-bottom:6px;
    border-bottom:1px solid var(--rule);
  }
  .hint{
    font-family:'Inter',sans-serif;
    font-size:12px;
    color:var(--ink-soft);
    margin:6px 0 14px;
    line-height:1.5;
  }

  .turn-selector {
    display: flex; gap: 10px; margin: 6px 0 14px;
  }
  .turn-btn {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 4px 10px; border: 1px solid var(--rule); background: transparent; cursor: pointer; border-radius: 2px;
  }
  .turn-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .matrix-wrap{overflow-x:auto;margin-top:24px;}
  table.matrix th, table.matrix td{text-align:center;font-size:11.5px; padding:8px;}
  table.matrix th.rowhead, table.matrix td.rowhead{text-align:left;font-size:12.5px;}
  table.matrix td.yes-1st{background:#E8DFF5;color:#6A449B;font-weight:700;}
  table.matrix td.yes-2nd{background:#E1F0F5;color:#2A6378;font-weight:700;}
  table.matrix td.yes-both{background:#E2F0D9;color:#386625;font-weight:700;}

  .reset-link{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-decoration:underline;
    cursor:pointer;
    background:none;border:none;
    margin-top:30px;
  }
  .loading{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;color:var(--ink-soft);padding:40px;text-align:center;
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Inizializzazione database carte da YGOPRODeck (Edison Format)…</div>
</div>

<script>
const STORAGE_KEY = 'kristyasworn-deck-v2';

const ROLES = [
  {id:'starter', label:'Starter', min:11, max:13},
  {id:'extender', label:'Extender', min:12, max:14},
  {id:'removal', label:'Rimozione', min:0, max:3},
  {id:'defense', label:'Difesa', min:5, max:7},
  {id:'reactive', label:'Reactive Ext.', min:0, max:3},
  {id:'bomb', label:'Bomba', min:2, max:3},
  {id:'necessity', label:'Necessità', min:0, max:1},
  {id:'other', label:'Altro', min:null, max:null}
];

const MATCHUPS = ['Vayu','Blackwing','LS Mirror','Frog','Machina','Gladiator Beast','Gigavise','Rogue'];

let API_CARD_POOL = []; 
let DATA = null;
let activeTab = 'main';

// Carica il pool in tempo reale tramite le API ufficiali di YGOPRODeck filtrato per Edison
async function fetchEdisonPool() {
  try {
    const res = await fetch('https://db.ygoprodeck.com/api/v1/cardinfo.php?format=edison');
    const json = await res.json();
    API_CARD_POOL = json.data.map(c => {
      let banStatus = 'U'; 
      if(c.banlist_info) {
        if(c.banlist_info.ban_edison === 'Limited') banStatus = 'L';
        else if(c.banlist_info.ban_edison === 'Semi-Limited') banStatus = 'S';
        else if(c.banlist_info.ban_edison === 'Banned') banStatus = 'F';
      }
      return {
        name: c.name,
        type: c.type.includes('Monster') ? (c.type.includes('Synchro') || c.type.includes('Fusion') ? 'ExtraMonster' : 'Monster') : (c.type.includes('Spell') ? 'Spell' : 'Trap'),
        atk: c.atk !== undefined ? c.atk : null,
        fairy: c.race === 'Fairy',
        status: banStatus
      };
    });
  } catch(e) {
    console.error("Errore nel recupero delle API. Uso fallback locale.", e);
    API_CARD_POOL = [];
  }
}

function defaultData(){
  return {
    main: [
      {name:'Ryko, Lightsworn Hunter', qty:3, type:'Monster', role:'starter', atk:200, fairy:false, ns:true},
      {name:'Lyla, Lightsworn Sorceress', qty:2, type:'Monster', role:'starter', atk:1600, fairy:false, ns:true},
      {name:'Wulf, Lightsworn Beast', qty:3, type:'Monster', role:'extender', atk:1800, fairy:false, ns:false},
      {name:'Archlord Kristya', qty:3, type:'Monster', role:'bomb', atk:2800, fairy:true, ns:false},
      {name:'Honest', qty:2, type:'Monster', role:'defense', atk:1400, fairy:true, ns:false},
      {name:'Solar Recharge', qty:3, type:'Spell', role:'extender', atk:null, fairy:false, ns:false}
    ],
    side: [
      {name:'Consecrated Light', qty:2, matchup:'Blackwing', going1st:true, going2nd:true, replaces:'Wulf'},
      {name:'Cyber Dragon', qty:2, matchup:'Machina', going1st:false, going2nd:true, replaces:'Ryko'}
    ],
    extra: [
      {name:'Stardust Dragon', qty:1}
    ]
  };
}

async function init() {
  await fetchEdisonPool();
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    DATA = raw ? JSON.parse(raw) : defaultData();
  }catch(e){
    DATA = defaultData();
  }
  render();
}

async function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
    const s = document.getElementById('save-status');
    if(s){ s.textContent = 'salvato nel browser'; s.classList.add('dot'); }
  }catch(e){};
}

async function resetAll(){
  if(!confirm('Ripristinare la lista iniziale?')) return;
  DATA = defaultData();
  await save();
  render();
}

function sumQty(list){ return list.reduce((a,c)=>a+Number(c.qty||0),0); }

function computeRoleCounts(){
  const counts = {};
  ROLES.forEach(r=>counts[r.id]=0);
  DATA.main.forEach(c=>{ counts[c.role] = (counts[c.role]||0) + Number(c.qty||0); });
  return counts;
}

function computeCustomRules(){
  let ddv=0, ns=0, fairy=0;
  DATA.main.forEach(c=>{
    const q = Number(c.qty||0);
    if(c.type==='Monster' && c.atk!==null && c.atk!=='' && Number(c.atk)<=1500) ddv+=q;
    if(c.ns) ns+=q;
    if(c.fairy) fairy+=q;
  });
  return {ddv, ns, fairy};
}

function roleColor(roleId){
  return {
    starter:'#5B6E3A', extender:'#2F5A6B', removal:'#A8402F', defense:'#9A7A1E',
    reactive:'#7A5A9A', bomb:'#B23A2E', necessity:'#6B6B6B', other:'#999'
  }[roleId] || '#999';
}

function sortMainDeck(){
  const roleOrder = ROLES.map(r => r.id);
  DATA.main.sort((a, b) => roleOrder.indexOf(a.role) - roleOrder.indexOf(b.role));
}

function render(){
  const app = document.getElementById('app');
  sortMainDeck();
  const mainTotal = sumQty(DATA.main);
  const roleCounts = computeRoleCounts();
  const custom = computeCustomRules();

  app.innerHTML = `
    <header>
      <div>
        <h1>Kristyasworn — Registro di Costruzione</h1>
        <div class="subtitle">Edison Format · Card Pool API YGOPRODeck Attivo</div>
      </div>
      <div class="save-status dot" id="save-status">salvato</div>
    </header>

    <nav class="tabs">
      <button data-tab="main" class="${activeTab==='main'?'active':''}">Main Deck (40)</button>
      <button data-tab="side" class="${activeTab==='side'?'active':''}">Side & Matrice Turno</button>
      <button data-tab="extra" class="${activeTab==='extra'?'active':''}">Extra Deck</button>
    </nav>

    <div class="panel ${activeTab==='main'?'active':''}">
      <div class="deck-total-banner ${mainTotal!==40?'bad':''}">
        <span>MAIN DECK TOTAL</span>
        <span>${mainTotal} / 40</span>
      </div>

      <div class="stamps">
        ${ROLES.filter(r=>r.id!=='other').map(r=>{
          const v = roleCounts[r.id]||0;
          const pass = v>=r.min && v<=r.max;
          return `<div class="stamp">
            <div class="label">${r.label}</div>
            <div class="value">${v}</div>
            <div class="target">target ${r.min===r.max? r.min : r.min+'–'+r.max}</div>
            <div class="mark ${pass?'pass':'flag'}">${pass?'OK':'FUORI'}</div>
          </div>`;
        }).join('')}
        
        <div class="stamp box-purple">
          <div class="label">DDV Target (ATK≤1500)</div>
          <div class="value">${custom.ddv}</div>
          <div class="target">max 12</div>
          <div class="mark ${custom.ddv<=12?'pass':'flag'}">${custom.ddv<=12?'OK':'FUORI'}</div>
        </div>
        
        <div class="stamp box-brown">
          <div class="label">Starter Normal Summon</div>
          <div class="value">${custom.ns}</div>
          <div class="target">max 9</div>
          <div class="mark ${custom.ns<=9?'pass':'flag'}">${custom.ns<=9?'OK':'FUORI'}</div>
        </div>
        
        <div class="stamp box-green">
          <div class="label">Fedeli (Fairy)</div>
          <div class="value">${custom.fairy}</div>
          <div class="target">8</div>
          <div class="mark ${custom.fairy===8?'pass':'flag'}">${custom.fairy===8?'OK':'FUORI'}</div>
        </div>
      </div>

      <div class="section-title">Organizzazione Categorie (Ordine Discendente)</div>
      <table>
        <thead><tr>
          <th style="width:25%">Nome Carta</th>
          <th>Qtà</th>
          <th>Tipo</th>
          <th>Ruolo</th>
          <th>ATK</th>
          <th>Fata</th>
          <th>NS</th>
          <th>Banlist</th>
          <th></th>
        </tr></thead>
        <tbody id="main-tbody"></tbody>
      </table>
      <button class="add-row" id="add-main">+ aggiungi carta</button>
    </div>

    <div class="panel ${activeTab==='side'?'active':''}">
      <div class="section-title">Side Deck — Configurazione Strategica Turni</div>
      <div class="hint">Imposta se inserire la carta andando Primo (Going 1st) o Secondo (Going 2nd) per configurare la doppia matrice sottostante.</div>
      <table>
        <thead><tr>
          <th style="width:25%">Nome Carta</th>
          <th>Qtà</th>
          <th>Matchup Target</th>
          <th class="center">Going 1st</th>
          <th class="center">Going 2nd</th>
          <th>Sostituisce</th>
          <th></th>
        </tr></thead>
        <tbody id="side-tbody"></tbody>
      </table>
      <button class="add-row" id="add-side">+ aggiungi a Side</button>

      <div class="matrix-wrap">
        <div class="section-title">Matrice Matchup Sdoppiata (1st / 2nd)</div>
        <table class="matrix">
          <thead>
            <tr>
              <th class="rowhead">Carta</th>
              ${MATCHUPS.map(m=>`<th>${m}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${DATA.side.map(c=>{
              return `<tr>
                <td class="rowhead"><strong>${c.name}</strong> <small style="color:var(--ink-soft)">(${c.qty})</small></td>
                ${MATCHUPS.map(m=>{
                  if (c.matchup !== m) return '<td>-</td>';
                  if (c.going1st && c.going2nd) return '<td class="yes-both">1st & 2nd</td>';
                  if (c.going1st) return '<td class="yes-1st">Going 1st</td>';
                  if (c.going2nd) return '<td class="yes-2nd">Going 2nd</td>';
                  return '<td>-</td>';
                }).join('')}
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="panel ${activeTab==='extra'?'active':''}">
      <div class="section-title">Extra Deck</div>
      <table>
        <thead><tr><th style="width:75%">Nome</th><th>Qtà</th><th></th></tr></thead>
        <tbody id="extra-tbody"></tbody>
      </table>
      <button class="add-row" id="add-extra">+ aggiungi extra</button>
    </div>

    <button class="reset-link" id="reset-btn">Ripristina configurazione iniziale</button>

    <datalist id="cardpool-datalist">
      ${API_CARD_POOL.map(c=>`<option value="${c.name}">`).join('')}
    </datalist>
  `;

  renderMainRows();
  renderSideRows();
  renderExtraRows();
  bindGlobal();
}

function findInApiPool(name){
  return API_CARD_POOL.find(c=>c.name.toLowerCase()===(name||'').trim().toLowerCase());
}

function legalityBadge(c){
  const pool = findInApiPool(c.name);
  if(!pool) return `<span style="font-size:10px;color:var(--ink-soft)">Edison Pool attivo</span>`;
  const max = {U:3, S:2, L:1, F:0}[pool.status];
  const over = Number(c.qty||0) > max;
  return `<span style="font-size:10px;color:${over?'var(--stamp-red)':'var(--ink-soft)'}">${pool.status==='U'?'Unlim (3)':pool.status==='S'?'Semi (2)':'Limited (1)'}${over?' ⚠':''}</span>`;
}

function renderMainRows(){
  const tbody = document.getElementById('main-tbody');
  tbody.innerHTML = DATA.main.map((c,i)=>`
    <tr>
      <td><input type="text" list="cardpool-datalist" value="${c.name}" data-idx="${i}" data-field="name" class="main-field"></td>
      <td class="center"><input type="number" min="0" value="${c.qty}" data-idx="${i}" data-field="qty" class="main-field"></td>
      <td>
        <select data-idx="${i}" data-field="type" class="main-field">
          ${['Monster','Spell','Trap'].map(t=>`<option ${c.type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </td>
      <td>
        <select data-idx="${i}" data-field="role" class="main-field role-select" style="color:${roleColor(c.role)}">
          ${ROLES.map(r=>`<option value="${r.id}" ${c.role===r.id?'selected':''}>${r.label}</option>`).join('')}
        </select>
      </td>
      <td><input type="number" value="${c.atk===null?'':c.atk}" data-idx="${i}" data-field="atk" class="main-field" style="width:55px" ${c.type!=='Monster'?'disabled':''}></td>
      <td class="center"><input type="checkbox" ${c.fairy?'checked':''} data-idx="${i}" data-field="fairy" class="main-field"></td>
      <td class="center"><input type="checkbox" ${c.ns?'checked':''} data-idx="${i}" data-field="ns" class="main-field"></td>
      <td>${legalityBadge(c)}</td>
      <td class="center"><button class="del-btn" data-idx="${i}" data-list="main">✕</button></td>
    </tr>
  `).join('');
}

function renderSideRows(){
  const tbody = document.getElementById('side-tbody');
  tbody.innerHTML = DATA.side.map((c,i)=>`
    <tr>
      <td><input type="text" list="cardpool-datalist" value="${c.name}" data-idx="${i}" data-field="name" class="side-field"></td>
      <td class="center"><input type="number" min="0" value="${c.qty}" data-idx="${i}" data-field="qty" class="side-field"></td>
      <td>
        <select data-idx="${i}" data-field="matchup" class="side-field">
          ${MATCHUPS.map(m=>`<option ${c.matchup===m?'selected':''}>${m}</option>`).join('')}
        </select>
      </td>
      <td class="center"><input type="checkbox" ${c.going1st?'checked':''} data-idx="${i}" data-field="going1st" class="side-field"></td>
      <td class="center"><input type="checkbox" ${c.going2nd?'checked':''} data-idx="${i}" data-field="going2nd" class="side-field"></td>
      <td><input type="text" value="${c.replaces||''}" data-idx="${i}" data-field="replaces" class="side-field" placeholder="Cosa esce"></td>
      <td class="center"><button class="del-btn" data-idx="${i}" data-list="side">✕</button></td>
    </tr>
  `).join('');
}

function renderExtraRows(){
  const tbody = document.getElementById('extra-tbody');
  tbody.innerHTML = DATA.extra.map((c,i)=>`
    <tr>
      <td><input type="text" list="cardpool-datalist" value="${c.name}" data-idx="${i}" data-field="name" class="extra-field"></td>
      <td class="center"><input type="number" min="0" value="${c.qty||1}" data-idx="${i}" data-field="qty" class="extra-field"></td>
      <td class="center"><button class="del-btn" data-idx="${i}" data-list="extra">✕</button></td>
    </tr>
  `).join('');
}

function bindGlobal(){
  document.querySelectorAll('nav.tabs button').forEach(b=>{
    b.onclick = ()=>{ activeTab = b.dataset.tab; render(); };
  });

  document.getElementById('reset-btn').onclick = resetAll;

  document.getElementById('add-main').onclick = ()=>{
    DATA.main.push({name:'', qty:1, type:'Monster', role:'other', atk:null, fairy:false, ns:false});
    save(); render();
  };
  document.getElementById('add-side').onclick = ()=>{
    DATA.side.push({name:'', qty:1, matchup:'Vayu', going1st:true, going2nd:true, replaces:''});
    save(); render();
  };
  document.getElementById('add-extra').onclick = ()=>{
    DATA.extra.push({name:'', qty:1});
    save(); render();
  };

  document.querySelectorAll('.del-btn').forEach(b=>{
    b.onclick = ()=>{
      DATA[b.dataset.list].splice(Number(b.dataset.idx), 1);
      save(); render();
    };
  });

  document.querySelectorAll('.main-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      let val = el.type==='checkbox' ? el.checked : el.value;
      if(field==='qty') val = Number(val);
      if(field==='atk') val = val===''? null : Number(val);
      
      DATA.main[idx][field] = val;

      if(field==='name'){
        const pool = findInApiPool(val);
        if(pool){
          DATA.main[idx].type = pool.type==='ExtraMonster' ? 'Monster' : pool.type;
          DATA.main[idx].atk = pool.atk;
          DATA.main[idx].fairy = pool.fairy;
        }
      }
      save(); render();
    };
  });

  document.querySelectorAll('.side-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      let val = el.type==='checkbox' ? el.checked : el.value;
      if(field==='qty') val = Number(val);
      DATA.side[idx][field] = val;
      save(); render();
    };
  });

  document.querySelectorAll('.extra-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      DATA.extra[idx][field] = field==='qty' ? Number(el.value) : el.value;
      save(); render();
    };
  });
}

init();
</script>
</body>
</html>
