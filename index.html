<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kristyasworn — Registro di Costruzione Avanzato</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1ECDC;
    --paper-dim:#E7E0CB;
    --ink:#1E2A38;
    --ink-soft:#4B5A6B;
    --rule:#C9BE9E;
    --stamp-red:#A8402F;
    --stamp-green:#5B6E3A;
    --stamp-gold:#9A7A1E;
    --card:#FAF7EE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

  header{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;margin-bottom:6px;flex-wrap:wrap;gap:10px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:30px;
    margin:0;
    letter-spacing:-0.01em;
  }
  .subtitle{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:4px;
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  .save-status{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-align:right;
  }
  .save-status.dot::before{
    content:'●';color:var(--stamp-green);margin-right:5px;
  }

  /* INTERFACCIA DI IMPORTAZIONE BLINDATA */
  .import-bridge {
    background: var(--card);
    border: 2px dashed var(--ink);
    padding: 16px;
    margin: 15px 0 25px 0;
    border-radius: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
  }
  .import-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--stamp-red);
  }
  .import-buttons { display: flex; gap: 10px; align-items: center; }
  .btn-action {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid var(--ink);
    background: var(--card);
    color: var(--ink);
    font-weight: 600;
  }
  .btn-action.submit { background: var(--stamp-red); color: white; border-color: var(--stamp-red); }

  nav.tabs{
    display:flex;gap:2px;margin:22px 0 20px;
    border-bottom:1px solid var(--rule);
  }
  nav.tabs button{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    background:none;border:none;
    padding:10px 16px;
    cursor:pointer;
    color:var(--ink-soft);
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
  }
  nav.tabs button.active{
    color:var(--ink);
    border-bottom:2px solid var(--stamp-red);
    font-weight:600;
  }

  .panel{display:none;}
  .panel.active{display:block;}

  .stamps{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin-bottom:26px;
  }
  .stamp{
    background:var(--card);
    border:1px solid var(--rule);
    border-radius:2px;
    padding:12px 14px;
    position:relative;
    overflow:hidden;
  }
  .stamp .label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink-soft);
  }
  .stamp .value{
    font-family:'Fraunces',serif;
    font-size:26px;
    font-weight:600;
    margin-top:2px;
  }
  .stamp .target{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--ink-soft);
    margin-top:1px;
  }
  .stamp .mark{
    position:absolute;top:10px;right:10px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    font-weight:600;
    letter-spacing:0.08em;
    padding:3px 7px;
    border-radius:2px;
    transform:rotate(4deg);
    border:1.5px solid currentColor;
  }
  .mark.pass{color:var(--stamp-green);}
  .mark.flag{color:var(--stamp-red);}

  .deck-total-banner{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    font-weight: 600;
    padding:12px 14px;
    border:1px solid var(--rule);
    background:var(--card);
    margin-bottom:18px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .deck-total-banner.bad{border-color:var(--stamp-red);color:var(--stamp-red);background:#FFF0F0;}

  .chip-row{display:flex;flex-wrap:wrap;gap:4px;max-width:260px;}
  .chip{
    font-family:'IBM Plex Mono',monospace;
    font-size:9.5px;
    padding:3px 6px;
    border:1px solid var(--rule);
    border-radius:10px;
    cursor:pointer;
    color:var(--ink-soft);
    background:transparent;
  }
  .chip.on{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  .matrix-wrap{overflow-x:auto;margin-top:24px;}
  table.matrix th, table.matrix td{text-align:center;font-size:11.5px; padding:8px;}
  table.matrix th.rowhead, table.matrix td.rowhead{text-align:left;font-size:12.5px;}
  table.matrix td.yes{background:#DCE3C8;color:var(--stamp-green);font-weight:700;}

  table{
    width:100%;
    border-collapse:collapse;
    background:var(--card);
    border:1px solid var(--rule);
  }
  th{
    text-align:left;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--ink-soft);
    padding:8px 10px;
    border-bottom:1.5px solid var(--ink);
    white-space:nowrap;
  }
  td{
    padding:6px 10px;
    border-bottom:1px solid var(--rule);
    font-size:13.5px;
    vertical-align:middle;
  }
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--paper-dim);}

  input[type=text], input[type=number], select{
    font-family:'Inter',sans-serif;
    font-size:13px;
    background:transparent;
    border:1px solid transparent;
    border-radius:2px;
    padding:4px 5px;
    width:100%;
    color:var(--ink);
  }
  input[type=text]:hover, input[type=number]:hover, select:hover{border-color:var(--rule);}
  input[type=text]:focus, input[type=number]:focus, select:focus{
    outline:none;border-color:var(--stamp-red);background:#fff;
  }
  input[type=number]{width:55px;text-align:center;}
  input[type=checkbox]{transform:scale(1.15);cursor:pointer;}
  td.center{text-align:center;}

  .del-btn{background:none;border:none;cursor:pointer;color:var(--stamp-red);font-size:15px;}
  .add-row{
    margin-top:12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    background:var(--ink);
    color:var(--paper);
    border:none;padding:8px 14px;
    cursor:pointer;
    border-radius:2px;
  }
  .add-row:hover{background:#31445a;}
  .section-title{font-family:'Fraunces',serif;font-size:19px;font-weight:600;margin:30px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--rule);}
  .hint{font-family:'Inter',sans-serif;font-size:12px;color:var(--ink-soft);margin:6px 0 14px;line-height:1.5;}
  .reset-link{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);text-decoration:underline;cursor:pointer;background:none;border:none;margin-top:30px;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const STORAGE_KEY = 'kristyasworn-deck-v2';

const ROLES = [
  {id:'starter', label:'Starter', min:11, max:13},
  {id:'extender', label:'Extender', min:12, max:14},
  {id:'removal', label:'Rimozione', min:0, max:3},
  {id:'defense', label:'Difesa', min:5, max:7},
  {id:'reactive', label:'Reactive Ext.', min:0, max:3},
  {id:'bomb', label:'Bomba', min:2, max:3},
  {id:'necessity', label:'Necessità', min:0, max:1},
  {id:'other', label:'Altro', min:null, max:null},
];

const MATCHUPS = ['Vayu','Blackwing','LS Mirror','Frog','Machina','Gladiator Beast','Gigavise','Rogue'];

// Database ID passaporto per gestire file .ydk (Edison Format)
const YDK_DATABASE = {
  '28279543': {name:'Archlord Kristya', type:'Monster', atk:2800, fairy:true},
  '53183600': {name:'Honest', type:'Monster', atk:1400, fairy:true},
  '59019082': {name:'Celestia, Lightsworn Angel', type:'Monster', atk:2300, fairy:true},
  '30113681': {name:'Garoth, Lightsworn Warrior', type:'Monster', atk:1900, fairy:false},
  '58996430': {name:'Wulf, Lightsworn Beast', type:'Monster', atk:1800, fairy:false},
  '22624363': {name:'Judgment Dragon', type:'Monster', atk:3000, fairy:false},
  '94192409': {name:'Lumina, Lightsworn Summoner', type:'Monster', atk:1400, fairy:false},
  '21698716': {name:'Lyla, Lightsworn Sorceress', type:'Monster', atk:1600, fairy:false},
  '30548775': {name:'Ryko, Lightsworn Hunter', type:'Monster', atk:1300, fairy:false},
  '33420078': {name:'Plaguespreader Zombie', type:'Monster', atk:400, fairy:false},
  '81020646': {name:'Solar Recharge', type:'Spell', atk:null, fairy:false},
  '16229315': {name:'Charge of the Light Brigade', type:'Spell', atk:null, fairy:false}
};

const CARD_POOL = [
  {name:'Archlord Kristya', type:'Monster', atk:2800, fairy:true, status:'U'},
  {name:'Aurkus, Lightsworn Druid', type:'Monster', atk:1400, fairy:false, status:'U'},
  {name:'Card Trooper', type:'Monster', atk:400, fairy:false, status:'L'},
  {name:'Celestia, Lightsworn Angel', type:'Monster', atk:2300, fairy:true, status:'U'},
  {name:'Ehren, Lightsworn Monk', type:'Monster', atk:1000, fairy:false, status:'U'},
  {name:'Garoth, Lightsworn Warrior', type:'Monster', atk:1900, fairy:false, status:'U'},
  {name:'Hecatrice', type:'Monster', atk:1500, fairy:true, status:'U'},
  {name:'Honest', type:'Monster', atk:1400, fairy:true, status:'S'},
  {name:'Judgment Dragon', type:'Monster', atk:3000, fairy:false, status:'S'},
  {name:'Lumina, Lightsworn Summoner', type:'Monster', atk:1400, fairy:false, status:'L'},
  {name:'Lyla, Lightsworn Sorceress', type:'Monster', atk:1600, fairy:false, status:'U'},
  {name:'Necro Gardna', type:'Monster', atk:800, fairy:false, status:'L'},
  {name:'Plaguespreader Zombie', type:'Monster', atk:400, fairy:false, status:'U'},
  {name:'Ryko, Lightsworn Hunter', type:'Monster', atk:1300, fairy:false, status:'U'},
  {name:'Tragoedia', type:'Monster', atk:2000, fairy:false, status:'L'},
  {name:'Wulf, Lightsworn Beast', type:'Monster', atk:1800, fairy:false, status:'U'},
  {name:'Charge of the Light Brigade', type:'Spell', atk:null, fairy:false, status:'L'},
  {name:'Foolish Burial', type:'Spell', atk:null, fairy:false, status:'U'},
  {name:'Heavy Storm', type:'Spell', atk:null, fairy:false, status:'L'},
  {name:'Solar Recharge', type:'Spell', atk:null, fairy:false, status:'U'},
  {name:'Beckoning Light', type:'Trap', atk:null, fairy:false, status:'U'},
  {name:'Gorz the Emissary of Darkness', type:'Monster', atk:2700, fairy:false, status:'L'},
  {name:'Cyber Dragon', type:'Monster', atk:2100, fairy:false, status:'S'},
  {name:'Consecrated Light', type:'Monster', atk:0, fairy:true, status:'U'},
  {name:'Book of Moon', type:'Spell', atk:null, fairy:false, status:'U'},
  {name:'Mirror Force', type:'Trap', atk:null, fairy:false, status:'L'},
  {name:'Torrential Tribute', type:'Trap', atk:null, fairy:false, status:'L'},
  {name:'Solemn Judgment', type:'Trap', atk:null, fairy:false, status:'L'}
];

function defaultData(){
  return {
    main: [
      {name:'Archlord Kristya', qty:3, type:'Monster', role:'bomb', atk:2800, fairy:true, ns:false},
      {name:'Ryko, Lightsworn Hunter', qty:3, type:'Monster', role:'starter', atk:1300, fairy:false, ns:true}
    ],
    side: [
      {name:'Consecrated Light', qty:2, matchups:['Blackwing'], replaces:''}
    ],
    extra: [
      {name:'Stardust Dragon', qty:1}
    ]
  };
}

let DATA = null;
let activeTab = 'main';

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    DATA = raw ? JSON.parse(raw) : defaultData();
  }catch(e){
    DATA = defaultData();
  }
  // Controllo di sicurezza preventivo anti-stringhe
  sanitizeDataQuantities();
  render();
}

function sanitizeDataQuantities() {
  ['main', 'side', 'extra'].forEach(sec => {
    if(DATA && DATA[sec]) {
      DATA[sec].forEach(c => {
        c.qty = parseInt(c.qty, 10) || 1;
      });
    }
  });
}

function save(){
  try{
    sanitizeDataQuantities();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
    const s = document.getElementById('save-status');
    if(s){ s.textContent = 'salvato in questo browser'; s.classList.add('dot'); }
  }catch(e){}
}

// MATEMATICAMENTE RETRIGGERATO AD INT FINALE
function sumQty(list){ 
  return list.reduce((acc, card) => acc + (parseInt(card.qty, 10) || 0), 0); 
}

function computeRoleCounts(){
  const counts = {};
  ROLES.forEach(r=>counts[r.id]=0);
  DATA.main.forEach(c=>{ counts[c.role] = (counts[c.role]||0) + (parseInt(c.qty, 10) || 0); });
  return counts;
}

function computeCustomRules(){
  let ddv=0, ns=0, fairy=0;
  DATA.main.forEach(c=>{
    const q = parseInt(c.qty, 10) || 0;
    if(c.type==='Monster' && c.atk!==null && c.atk!=='' && Number(c.atk)<=1500) ddv+=q;
    if(c.ns) ns+=q;
    if(c.fairy) fairy+=q;
  });
  return {ddv, ns, fairy};
}

function roleColor(roleId){
  return {
    starter:'#5B6E3A', extender:'#2F5A6B', removal:'#A8402F', defense:'#9A7A1E',
    reactive:'#7A5A9A', bomb:'#B23A2E', necessity:'#6B6B6B', other:'#999'
  }[roleId] || '#999';
}

// PARSER UNIVERSALE .YDK / .TXT
function handleImportFile(e) {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(evt) {
    const text = evt.target.result;
    
    let importedMain = [];
    let importedSide = [];
    let importedExtra = [];

    // CASO 1: È UN FILE .YDK STANDARD DI YGOPro
    if(text.includes('#main') || text.includes('#extra') || text.includes('!side')) {
      let currentSection = null;
      const lines = text.split(/\r?\n/);
      
      lines.forEach(line => {
        let clean = line.trim();
        if(!clean || clean.startsWith('#created by')) return;
        
        if(clean === '#main') { currentSection = 'main'; return; }
        if(clean === '#extra') { currentSection = 'extra'; return; }
        if(clean === '!side') { currentSection = 'side'; return; }
        
        // Se è una riga numerica (ID passaporto carta)
        if(/^\d+$/.test(clean)) {
          const cardId = clean;
          const dbCard = YDK_DATABASE[cardId] || { name: `Card ID: ${cardId}`, type: 'Monster', atk: null, fairy: false };
          
          let targetArray = currentSection === 'main' ? importedMain : (currentSection === 'side' ? importedSide : importedExtra);
          
          let existing = targetArray.find(x => x.name === dbCard.name);
          if(existing) {
            existing.qty = parseInt(existing.qty, 10) + 1;
          } else {
            targetArray.push({
              name: dbCard.name,
              qty: 1, // Parte obbligatoriamente come intero puro
              type: dbCard.type || 'Monster',
              role: dbCard.fairy ? 'bomb' : 'other',
              atk: dbCard.atk,
              fairy: dbCard.fairy || false,
              ns: false,
              matchups: [],
              replaces: ''
            });
          }
        }
      });
    } 
    // CASO 2: FILETXT / COPIA-INCOLLA CON QUANTITÀ TIPO "3 Archlord Kristya"
    else {
      let currentSection = 'main';
      const lines = text.split(/\r?\n/);
      
      lines.forEach(line => {
        let clean = line.trim().toLowerCase();
        if(!clean) return;
        
        if(clean.includes('side deck') || clean.includes('side:')) { currentSection = 'side'; return; }
        if(clean.includes('extra deck') || clean.includes('extra:')) { currentSection = 'extra'; return; }
        if(clean.includes('main deck') || clean.includes('main:')) { currentSection = 'main'; return; }
        
        const match = line.trim().match(/^(\d+)\x20+(.+)$/);
        if(match) {
          const qty = parseInt(match[1], 10);
          const name = match[2].replace(/\s*-\s*(monster|spell|trap|magia|trappola).*$/i, '').trim();
          const poolMatch = CARD_POOL.find(p => p.name.toLowerCase() === name.toLowerCase());
          
          let targetArray = currentSection === 'main' ? importedMain : (currentSection === 'side' ? importedSide : importedExtra);
          
          targetArray.push({
            name: poolMatch ? poolMatch.name : name,
            qty: qty, // Forzato intero reale
            type: poolMatch ? poolMatch.type : 'Monster',
            role: 'other',
            atk: poolMatch ? poolMatch.atk : null,
            fairy: poolMatch ? poolMatch.fairy : false,
            ns: false,
            matchups: [],
            replaces: ''
          });
        }
      });
    }

    // Applica e salva solo se ha trovato qualcosa
    if(importedMain.length > 0 || importedSide.length > 0 || importedExtra.length > 0) {
      DATA.main = importedMain;
      DATA.side = importedSide;
      DATA.extra = importedExtra;
      
      // Sanitizzazione finale preventiva prima del calcolo grafico
      sanitizeDataQuantities();
      
      save();
      render();
      
      alert(`Importazione completata con successo!\n\nCarte Main: ${sumQty(DATA.main)}\nCarte Side: ${sumQty(DATA.side)}\nCarte Extra: ${sumQty(DATA.extra)}`);
    } else {
      alert("Errore: Formato file non supportato. Carica un file .ydk valido di YGOPro o un .txt con righe del tipo '3 Archlord Kristya'.");
    }
  };
  reader.readAsText(file);
}

function render(){
  const app = document.getElementById('app');
  const mainTotal = sumQty(DATA.main);
  const sideTotal = sumQty(DATA.side);
  const extraTotal = sumQty(DATA.extra);
  const roleCounts = computeRoleCounts();
  const custom = computeCustomRules();

  app.innerHTML = `
    <header>
      <div>
        <h1>Kristyasworn — Registro di Costruzione</h1>
        <div class="subtitle">Edison Format · Supporto nativo integrato .YDK ed Esportazione Rigida</div>
      </div>
      <div class="save-status dot" id="save-status">salvato</div>
    </header>

    <div class="import-bridge">
      <div class="import-label">STRUMENTO DI IMPORTAZIONE AUTOMATICA INTERNA (.YDK / .TXT)</div>
      <div class="import-buttons">
        <input type="file" id="universal-uploader" accept=".ydk,.txt" style="display:none" />
        <button class="btn-action submit" onclick="document.getElementById('universal-uploader').click()">↑ Carica file Deck (.ydk / .txt)</button>
      </div>
    </div>

    <nav class="tabs">
      <button data-tab="main" class="${activeTab==='main'?'active':''}">Main Deck (${mainTotal})</button>
      <button data-tab="side" class="${activeTab==='side'?'active':''}">Side Patterns (${sideTotal} / 15)</button>
      <button data-tab="extra" class="${activeTab==='extra'?'active':''}">Extra Deck (${extraTotal})</button>
    </nav>

    <div class="panel ${activeTab==='main'?'active':''}">
      <div class="deck-total-banner ${mainTotal!==40?'bad':''}">
        <span>MAIN DECK TOTAL</span>
        <span>${mainTotal} / 40 Carte</span>
      </div>

      <div class="stamps">
        ${ROLES.filter(r=>r.id!=='other').map(r=>{
          const v = roleCounts[r.id]||0;
          const pass = v>=r.min && v<=r.max;
          return `<div class="stamp">
            <div class="label">${r.label}</div>
            <div class="value">${v}</div>
            <div class="target">target ${r.min===r.max? r.min : r.min+'–'+r.max}</div>
            <div class="mark ${pass?'pass':'flag'}">${pass?'OK':'FUORI'}</div>
          </div>`;
        }).join('')}
        <div class="stamp">
          <div class="label">DDV Target (ATK≤1500)</div>
          <div class="value">${custom.ddv}</div>
          <div class="target">max 12</div>
          <div class="mark ${custom.ddv<=12?'pass':'flag'}">${custom.ddv<=12?'OK':'FUORI'}</div>
        </div>
        <div class="stamp">
          <div class="label">Starter
