<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kristyasworn — Registro di Costruzione Avanzato</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1ECDC;
    --paper-dim:#E7E0CB;
    --ink:#1E2A38;
    --ink-soft:#4B5A6B;
    --rule:#C9BE9E;
    --stamp-red:#A8402F;
    --stamp-green:#5B6E3A;
    --stamp-gold:#9A7A1E;
    --card:#FAF7EE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

  header{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;margin-bottom:6px;flex-wrap:wrap;gap:10px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:30px;
    margin:0;
    letter-spacing:-0.01em;
  }
  .subtitle{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:4px;
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  .save-status{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-align:right;
  }
  .save-status.dot::before{
    content:'●';color:var(--stamp-green);margin-right:5px;
  }

  .pdf-bridge {
    background: var(--card);
    border: 1px dashed var(--stamp-red);
    padding: 16px;
    margin: 15px 0;
    border-radius: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
  }
  .pdf-io-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--stamp-red);
  }
  .pdf-buttons { display: flex; gap: 10px; align-items: center; }
  .btn-pdf {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    padding: 8px 12px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid var(--ink);
    background: var(--card);
    color: var(--ink);
  }
  .btn-pdf.submit { background: var(--stamp-red); color: white; border-color: var(--stamp-red); }

  nav.tabs{
    display:flex;gap:2px;margin:22px 0 20px;
    border-bottom:1px solid var(--rule);
  }
  nav.tabs button{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    background:none;border:none;
    padding:10px 16px;
    cursor:pointer;
    color:var(--ink-soft);
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
  }
  nav.tabs button.active{
    color:var(--ink);
    border-bottom:2px solid var(--stamp-red);
    font-weight:600;
  }

  .panel{display:none;}
  .panel.active{display:block;}

  .stamps{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin-bottom:26px;
  }
  .stamp{
    background:var(--card);
    border:1px solid var(--rule);
    border-radius:2px;
    padding:12px 14px;
    position:relative;
    overflow:hidden;
  }
  .stamp .label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink-soft);
  }
  .stamp .value{
    font-family:'Fraunces',serif;
    font-size:26px;
    font-weight:600;
    margin-top:2px;
  }
  .stamp .target{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--ink-soft);
    margin-top:1px;
  }
  .stamp .mark{
    position:absolute;top:10px;right:10px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    font-weight:600;
    letter-spacing:0.08em;
    padding:3px 7px;
    border-radius:2px;
    transform:rotate(4deg);
    border:1.5px solid currentColor;
  }
  .mark.pass{color:var(--stamp-green);}
  .mark.flag{color:var(--stamp-red);}

  .stamp.box-purple { background-color: #F3EAF9; border-color: #B399D4; }
  .stamp.box-purple .label, .stamp.box-purple .target { color: #6A449B; }
  .stamp.box-purple .mark.pass { color: #6A449B; border-color: #6A449B; }

  .stamp.box-brown { background-color: #F7EFE5; border-color: #CDA67F; }
  .stamp.box-brown .label, .stamp.box-brown .target { color: #785129; }
  .stamp.box-brown .mark.pass { color: #785129; border-color: #785129; }

  .stamp.box-green { background-color: #EFF5E9; border-color: #A3C997; }
  .stamp.box-green .label, .stamp.box-green .target { color: #436F37; }
  .stamp.box-green .mark.pass { color: #436F37; border-color: #436F37; }

  .deck-total-banner{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    padding:9px 14px;
    border:1px solid var(--rule);
    background:var(--card);
    margin-bottom:18px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .deck-total-banner.bad{border-color:var(--stamp-red);color:var(--stamp-red);}

  .bubble-container {
    display: flex; gap: 4px; flex-wrap: wrap; align-items: center;
  }
  .mu-bubble {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    padding: 3px 6px; border: 1px solid var(--rule); background: var(--card);
    color: var(--ink-soft); cursor: pointer; border-radius: 12px; transition: all 0.15s ease;
  }
  .mu-bubble.active {
    background: var(--stamp-red); color: white; border-color: var(--stamp-red);
  }

  .turn-opts { display: flex; gap: 5px; }
  .turn-badge {
    font-family: 'IBM Plex Mono', monospace; font-size: 9.5px;
    padding: 2px 5px; border: 1px solid var(--rule); border-radius: 2px;
    cursor: pointer; color: var(--ink-soft); background: var(--card);
  }
  .turn-badge.active.t1 { background: #E8DFF5; color: #6A449B; border-color: #B399D4; font-weight:600; }
  .turn-badge.active.t2 { background: #E1F0F5; color: #2A6378; border-color: #A3C997; font-weight:600; }

  table{
    width:100%;
    border-collapse:collapse;
    background:var(--card);
    border:1px solid var(--rule);
    margin-bottom:20px;
  }
  th{
    text-align:left;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--ink-soft);
    padding:8px 10px;
    border-bottom:1.5px solid var(--ink);
    white-space:nowrap;
  }
  td{
    padding:6px 10px;
    border-bottom:1px solid var(--rule);
    font-size:13.5px;
    vertical-align:middle;
  }
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--paper-dim);}

  input[type=text], input[type=number], select{
    font-family:'Inter',sans-serif;
    font-size:13px;
    background:transparent;
    border:1px solid transparent;
    border-radius:2px;
    padding:4px 5px;
    width:100%;
    color:var(--ink);
  }
  input[type=text]:hover, input[type=number]:hover, select:hover{border-color:var(--rule);}
  input[type=text]:focus, input[type=number]:focus, select:focus{
    outline:none;border-color:var(--stamp-red);background:#fff;
  }
  input[type=number]{width:55px;text-align:center;}
  td.center{text-align:center;}

  .add-row{
    margin-top:12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    background:var(--ink);
    color:var(--paper);
    border:none;padding:8px 14px;
    cursor:pointer;
    border-radius:2px;
  }
  .add-row:hover{background:#31445a;}

  .section-title{
    font-family:'Fraunces',serif;
    font-size:19px;
    font-weight:600;
    margin:30px 0 10px;
    padding-bottom:6px;
    border-bottom:1px solid var(--rule);
  }

  .matrix-wrap{overflow-x:auto;margin-top:24px;}
  table.matrix th, table.matrix td{text-align:center;font-size:11.5px; padding:8px;}
  table.matrix th.rowhead, table.matrix td.rowhead{text-align:left;font-size:12.5px;}
  table.matrix td.yes-1st{background:#E8DFF5;color:#6A449B;font-weight:700;}
  table.matrix td.yes-2nd{background:#E1F0F5;color:#2A6378;font-weight:700;}
  table.matrix td.yes-both{background:#E2F0D9;color:#386625;font-weight:700;}

  .reset-link{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-decoration:underline;
    cursor:pointer;
    background:none;border:none;
    margin-top:30px;
  }

  @media print {
    body { background: white; color: black; font-size: 11px; }
    .wrap { padding: 0; max-width: 100%; }
    .pdf-bridge, nav.tabs, .add-row, .del-btn, #reset-btn { display: none !important; }
    .panel { display: block !important; }
    table { page-break-inside: avoid; border: 1px solid #000; }
    th { border-bottom: 2px solid #000; color: #000; }
    td { border-bottom: 1px solid #000; padding: 4px; }
  }
</style>
</head>

function save(){

function sumQty(list){ 
  return list.reduce((a,c)=> a + parseInt(c.qty || 0, 10), 0); 
}

function computeRoleCounts(){
  const counts = {};
  ROLES.forEach(r=>counts[r.id]=0);
  DATA.main.forEach(c=>{ counts[c.role] = (counts[c.role]||0) + parseInt(c.qty || 0, 10); });
  return counts;
}

function computeCustomRules(){
  let ddv=0, ns=0, fairy=0;
  DATA.main.forEach(c=>{
    const q = parseInt(c.qty || 0, 10);
    if(c.type==='Monster' && c.atk!==null && c.atk!=='' && Number(c.atk)<=1500) ddv+=q;
    if(c.ns) ns+=q;
    if(c.fairy) fairy+=q;
  });
  return {ddv, ns, fairy};
}

function roleColor(roleId){

    starter:'#5B6E3A', extender:'#2F5A6B', removal:'#A8402F', defense:'#9A7A1E',
    reactive:'#7A5A9A', bomb:'#B23A2E', necessity:'#6B6B6B', other:'#999'
  }[roleId] || '#999';
}

// PARSER STRITTO .YDK (PREVIENE COMPRENSIONI ERRATE DEL CONTEGGIO)
function handleFileImport(e) {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(evt) {
    const text = evt.target.result;
    
    const newMain = [];
    const newSide = [];
    const newExtra = [];
    let currentSection = null;
    
    const lines = text.split(/\r?\n/);
    lines.forEach(line => {
      const clean = line.trim();
      if(!clean || clean.startsWith('#created by')) return;
      
      if(clean === '#main') { currentSection = 'main'; return; }
      if(clean === '#extra') { currentSection = 'extra'; return; }
      if(clean === '!side') { currentSection = 'side'; return; }
      
      if(/^\d+$/.test(clean)) {
        const id = clean;
        const info = YDK_DB[id] || {name: `ID: ${id}`, type:'Monster', atk:null, fairy:false};
        
        let targetArr = newMain;
        if(currentSection === 'side') targetArr = newSide;
        if(currentSection === 'extra') targetArr = newExtra;
        
        const existing = targetArr.find(c => c.name === info.name);
        if(existing) {
          existing.qty = parseInt(existing.qty, 10) + 1;
        } else {
          targetArr.push({
            name: info.name,
            qty: 1,
            type: info.type,
            role: info.fairy ? 'bomb' : (info.type === 'Spell' ? 'extender' : 'starter'),
            atk: info.atk,
            fairy: info.fairy,
            ns: info.type === 'Monster' && info.atk <= 1900,
            matchups: [],
            going1st: true,
            going2nd: true,
            replaces: ''
          });
        }
      }
    });

    if(newMain.length > 0 || newSide.length > 0 || newExtra.length > 0) {
      DATA.main = newMain;
      DATA.side = newSide;
      DATA.extra = newExtra;
      save();
      render();
      alert(`YDK Importato!\nMain: ${sumQty(newMain)}\nSide: ${sumQty(newSide)}\nExtra: ${sumQty(newExtra)}`);
    } else {
      alert("Il file non contiene un formato .ydk valido (#main, #extra, !side).");
    }
  };
  reader.readAsText(file);
}

function triggerPdfDownload() {
  window.print();
}

function toggleMatchupInSide(cardIdx, mu) {
  if (!DATA.side[cardIdx].matchups) DATA.side[cardIdx].matchups = [];
  let mus = DATA.side[cardIdx].matchups;
  if (mus.includes(mu)) {
    DATA.side[cardIdx].matchups = mus.filter(m => m !== mu);
  } else {
    mus.push(mu);
  }
  save();
  render();
}

function toggleTurnOpt(cardIdx, field) {
  DATA.side[cardIdx][field] = !DATA.side[cardIdx][field];
  save();
  render();
}

        <div class="subtitle">Edison Format · Bridge Strutturato .YDK Completo</div>
      </div>
      <div class="save-status dot" id="save-status">salvato</div>
    </header>

    <div class="pdf-bridge">
      <div class="pdf-io-label">YGOPro DECK .YDK INPUT</div>
      <div class="pdf-buttons">
        <input type="file" id="pdf-uploader" accept=".ydk" style="display:none" />
        <button class="btn-pdf" onclick="document.getElementById('pdf-uploader').click()">↑ Carica File .ydk (EDOPro)</button>
        <button class="btn-pdf submit" id="pdf-downloader">↓ Stampa / Esporta Foglio</button>
      </div>
    </div>

    <nav class="tabs">
      <button data-tab="main" class="${activeTab==='main'?'active':''}">Main Deck (${mainTotal})</button>
      <button data-tab="side" class="${activeTab==='side'?'active':''}">Side & Matrice (${sideTotal} / 15)</button>
      <button data-tab="extra" class="${activeTab==='extra'?'active':''}">Extra Deck (${extraTotal})</button>
    </nav>

    <div class="panel ${activeTab==='main'?'active':''}">
      <div class="deck-total-banner ${mainTotal!==40?'bad':''}">
        <span>MAIN DECK TOTAL</span>
        <span>${mainTotal} / 40</span>
      </div>

      <div class="stamps">
        ${ROLES.filter(r=>r.id!=='other').map(r=>{
          const v = roleCounts[r.id]||0;
          const pass = v>=r.min && v<=r.max;
          return `<div class="stamp">
            <div class="label">${r.label}</div>
            <div class="value">${v}</div>
            <div class="target">target ${r.min===r.max? r.min : r.min+'–'+r.max}</div>
            <div class="mark ${pass?'pass':'flag'}">${pass?'OK':'FUORI'}</div>
          </div>`;
        }).join('')}
        
        <div class="stamp box-purple">
          <div class="label">DDV Target (ATK≤1500)</div>
          <div class="value">${custom.ddv}</div>
          <div class="target">max 12</div>
          <div class="mark ${custom.ddv<=12?'pass':'flag'}">${custom.ddv<=12?'OK':'FUORI'}</div>
        </div>
        
        <div class="stamp box-brown">
          <div class="label">Starter Normal Summon</div>
          <div class="value">${custom.ns}</div>
          <div class="target">max 9</div>
          <div class="mark ${custom.ns<=9?'pass':'flag'}">${custom.ns<=9?'OK':'FUORI'}</div>
        </div>
        
        <div class="stamp box-green">
          <div class="label">Fedeli (Fairy)</div>
          <div class="value">${custom.fairy}</div>
          <div class="target">8</div>
          <div class="mark ${custom.fairy===8?'pass':'flag'}">${custom.fairy===8?'OK':'FUORI'}</div>
        </div>
      </div>

      <div class="section-title">Elenco Carte Main Deck</div>
      <table>
        <thead><tr>
          <th style="width:30%">Nome Carta</th>
          <th>Qtà</th>
          <th>Tipo</th>
          <th>Ruolo</th>
          <th>ATK</th>
          <th>Fata</th>
          <th>NS</th>
          <th></th>
        </tr></thead>
        <tbody id="main-tbody"></tbody>
      </table>
      <button class="add-row" id="add-main">+ aggiungi carta</button>
    </div>

    <div class="panel ${activeTab==='side'?'active':''}">
      <div class="deck-total-banner ${sideTotal>15?'bad':''}">
        <span>SIDE DECK TOTAL</span>
        <span>${sideTotal} / 15 Carte</span>
      </div>

      <div class="section-title">Side Deck — Assegnazione Rapida Matchup</div>
      <table>
        <thead><tr>
          <th style="width:25%">Nome Carta</th>
          <th style="width:7%">Qtà</th>
          <th style="width:40%">Matchups Target</th>
          <th style="width:13%">Turno</th>
          <th style="width:10%">Sostituisce</th>
          <th></th>
        </tr></thead>
        <tbody id="side-tbody"></tbody>
      </table>
      <button class="add-row" id="add-side">+ aggiungi a Side</button>

      <div class="matrix-wrap">
        <div class="section-title">Matrice Riepilogativa Turni</div>
        <table class="matrix">
          <thead>
            <tr>
              <th class="rowhead">Carta</th>
              ${MATCHUPS.map(m=>`<th>${m}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${DATA.side.map(c=>{
              const mus = c.matchups || [];
              return `<tr>
                <td class="rowhead"><strong>${c.name || 'Senza nome'}</strong> <small style="color:var(--ink-soft)">(${c.qty})</small></td>
                ${MATCHUPS.map(m=>{
                  if (!mus.includes(m)) return '<td>-</td>';
                  if (c.going1st && c.going2nd) return '<td class="yes-both">1st & 2nd</td>';
                  if (c.going1st) return '<td class="yes-1st">Going 1st</td>';
                  if (c.going2nd) return '<td class="yes-2nd">Going 2nd</td>';
                  return '<td>-</td>';
                }).join('')}
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="panel ${activeTab==='extra'?'active':''}">
      <div class="deck-total-banner ${extraTotal>15?'bad':''}">
        <span>EXTRA DECK TOTAL</span>
        <span>${extraTotal} / 15</span>
      </div>
      <div class="section-title">Extra Deck</div>
      <table>
        <thead><tr><th style="width:75%">Nome</th><th>Qtà</th><th></th></tr></thead>
        <tbody id="extra-tbody"></tbody>
      </table>
      <button class="add-row" id="add-extra">+ aggiungi extra</button>
    </div>

    <button class="reset-link" id="reset-btn">Ripristina configurazione iniziale Kristyasworn</button>
  `;

  renderMainRows();
  renderSideRows();
  renderExtraRows();
  initPoolDatalist();
  bindGlobal();
}

function findInLocalPool(name){
  return LOCAL_CARD_POOL.find(c=>c.name.toLowerCase()===(name||'').trim().toLowerCase());
}

function renderMainRows(){
  const tbody = document.getElementById('main-tbody');
  if(!tbody) return;
  tbody.innerHTML = DATA.main.map((c,i)=>`
    <tr>
      <td><input type="text" value="${c.name.replace(/"/g, '&quot;')}" data-idx="${i}" data-field="name" class="main-field"></td>
      <td class="center"><input type="number" min="0" value="${c.qty}" data-idx="${i}" data-field="qty" class="main-field"></td>
      <td>
        <select data-idx="${i}" data-field="type" class="main-field">
          ${['Monster','Spell','Trap'].map(t=>`<option ${c.type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </td>
      <td>
        <select data-idx="${i}" data-field="role" class="main-field role-select" style="color:${roleColor(c.role)}">
          ${ROLES.map(r=>`<option value="${r.id}" ${c.role===r.id?'selected':''}>${r.label}</option>`).join('')}
        </select>
      </td>
      <td><input type="number" value="${c.atk===null?'':c.atk}" data-idx="${i}" data-field="atk" class="main-field" style="width:55px" ${c.type!=='Monster'?'disabled':''}></td>
      <td class="center"><input type="checkbox" ${c.fairy?'checked':''} data-idx="${i}" data-field="fairy" class="main-field"></td>
      <td class="center"><input type="checkbox" ${c.ns?'checked':''} data-idx="${i}" data-field="ns" class="main-field"></td>
      <td class="center"><button class="del-btn" data-idx="${i}" data-list="main">✕</button></td>
    </tr>
  `).join('');
}

function renderSideRows(){
  const tbody = document.getElementById('side-tbody');
  if(!tbody) return;
  tbody.innerHTML = DATA.side.map((c,i)=>{
    const mus = c.matchups || [];
    return `
      <tr>
        <td><input type="text" value="${c.name.replace(/"/g, '&quot;')}" data-idx="${i}" data-field="name" class="side-field"></td>
        <td class="center"><input type="number" min="0" value="${c.qty}" data-idx="${i}" data-field="qty" class="side-field"></td>
        <td>
          <div class="bubble-container">
            ${MATCHUPS.map(m => `
              <span class="mu-bubble ${mus.includes(m)?'active':''}" onclick="toggleMatchupInSide(${i}, '${m}')">${m}</span>
            `).join('')}
          </div>
        </td>
        <td>
          <div class="turn-opts">
            <span class="turn-badge ${c.going1st?'active t1':''}" onclick="toggleTurnOpt(${i}, 'going1st')">1st</span>
            <span class="turn-badge ${c.going2nd?'active t2':''}" onclick="toggleTurnOpt(${i}, 'going2nd')">2nd</span>
          </div>
        </td>
        <td><input type="text" value="${c.replaces||''}" data-idx="${i}" data-field="replaces" class="side-field"></td>
        <td class="center"><button class="del-btn" data-idx="${i}" data-list="side">✕</button></td>
      </tr>
    `;
  }).join('');
}

function renderExtraRows(){
  const tbody = document.getElementById('extra-tbody');
  if(!tbody) return;
  tbody.innerHTML = DATA.extra.map((c,i)=>`
    <tr>
      <td><input type="text" value="${c.name.replace(/"/g, '&quot;')}" data-idx="${i}" data-field="name" class="extra-field"></td>
      <td class="center"><input type="number" min="0" value="${c.qty||1}" data-idx="${i}" data-field="qty" class="extra-field"></td>
      <td class="center"><button class="del-btn" data-idx="${i}" data-list="extra">✕</button></td>
    </tr>
  `).join('');
}

function bindGlobal(){
  document.querySelectorAll('nav.tabs button').forEach(b=>{
    b.onclick = ()=>{ activeTab = b.dataset.tab; render(); };
  });

  document.getElementById('reset-btn').onclick = resetAll;
  document.getElementById('pdf-uploader').onchange = handleFileImport;
  document.getElementById('pdf-downloader').onclick = triggerPdfDownload;

  document.getElementById('add-main').onclick = () => {
    DATA.main.push({name:'', qty:1, type:'Monster', role:'other', atk:null, fairy:false, ns:false});
    save(); render();
  };
  document.getElementById('add-side').onclick = () => {
    DATA.side.push({name:'', qty:1, matchups:[], going1st:true, going2nd:true, replaces:''});
    save(); render();
  };
  document.getElementById('add-extra').onclick = () => {
    DATA.extra.push({name:'', qty:1});
    save(); render();
  };

  document.querySelectorAll('.del-btn').forEach(b=>{
    b.onclick = ()=>{
      DATA[b.dataset.list].splice(Number(b.dataset.idx), 1);
      save(); render();
    };
  });

  document.querySelectorAll('.main-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      let val = el.type==='checkbox' ? el.checked : el.value;
      if(field==='qty') val = parseInt(val || 0, 10);
      if(field==='atk') val = val===''? null : Number(val);
      
      DATA.main[idx][field] = val;
      if(field==='name'){
        const pool = findInLocalPool(val);
        if(pool){
          DATA.main[idx].type = pool.type;
          DATA.main[idx].atk = pool.atk;
          DATA.main[idx].fairy = pool.fairy;
        }
      }
      save(); render();
    };
  });

  document.querySelectorAll('.side-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      let val = field==='qty' ? parseInt(el.value || 0, 10) : el.value;
      DATA.side[idx][field] = val;
      save(); render();
    };
  });

  document.querySelectorAll('.extra-field').forEach(el=>{
    el.onchange = ()=>{
      const idx = Number(el.dataset.idx), field = el.dataset.field;
      DATA.extra[idx][field] = field==='qty' ? parseInt(el.value || 0, 10) : el.value;
      save(); render();
    };
  });
}

init();
</script>
</body>
</html>
